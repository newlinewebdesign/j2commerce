COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Opret et nyt produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Klik på knappen »<strong>« og derefter på »</strong>« for at oprette et nyt produkt. Dette åbner Joomla-artikelleditoren med J2Commerce-produktformularen."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Indtast en produktnavn"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Indtast en beskrivende titel til dit produkt. Dette er artiklens titel og vil blive vist som produktnavnet i din butik."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Vælg fanen J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Vælg fanen »<strong>« under »J2Commerce« »</strong>« for at få adgang til de grundlæggende indstillinger for produktet."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Brug artiklen som produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Aktivér indstillingen »Brug som produkt« for at omdanne artiklen til et produkt. <br> Sørg for, at den er indstillet til »<strong>« Ja </strong>, før du fortsætter. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Vælg produkttype"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> I denne gennemgang opretter vi en simpel produkttype. <br> Vælg »<strong>« og derefter »Simple« </strong> i rullemenuen. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Gem formularen for at fortsætte"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Vælg »Gem og fortsæt« for at gemme ændringen og få adgang til produktoplysningerne. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Vælg fanen J2Commerce igen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Klik på fanen »<strong>« under »J2Commerce« »</strong>« for at få adgang til de vigtigste produktindstillinger, såsom synlighed, SKU, producent og afgiftsprofil."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Indstil produktets synlighed"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Indstil denne indstilling til »<strong>« (Ja) </strong> for at gøre produktet synligt i din butik. Når indstillingen er sat til »Nej«, findes produktet stadig, men vises ikke for kunderne."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Indtast produktets SKU (lagerbeholdningsenhed)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Indtast et unikt varenummer for dit produkt. Dette er en intern referencenummer, der bruges til lagerstyring og ordrehåndtering."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Indstil skatteprofilen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Vælg den relevante skatteprofil for dette produkt. Skatteprofilerne bestemmer, hvilke skattesatser der skal anvendes, afhængigt af kundens placering. Du kan konfigurere skatteprofilerne under <strong> J2Commerce &rarr; Skatteprofiler </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Vælg fanen »Priser«"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Vælg fanen »<strong>« under »Pris</strong>« for at indstille produktprisen. Du kan også konfigurere avancerede prisregler for kundegrupper og datointervaller."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Indstil normalprisen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Indtast den normale salgspris for dit produkt. Dette er den basispris, som vises for alle kunder, før eventuelle rabatter eller særlige prisregler træder i kraft."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Vælg fanen »Lager«"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Vælg fanen »<strong>« under »Inventory« (Lager) for at administrere lagerniveauerne. Her kan du aktivere lagerstyring, angive mængder og konfigurere, hvordan restordrer skal håndteres."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Administrer lagerbeholdninger"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Aktivér »<strong>« under »Manage Stock« </strong>, hvis du ønsker, at J2Commerce skal registrere lagerbeholdningen for denne vare. Når denne funktion er aktiveret, reduceres lagerbeholdningen ved hver ordre."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Vælg fanen »Forsendelse«"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Vælg fanen »<strong>« under »Shipping</strong>« for at konfigurere forsendelsesindstillingerne for dette produkt, herunder mål og vægt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Aktivér forsendelse"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Vælg »<strong>« (Ja) </strong>, hvis produktet skal sendes fysisk. Digitale produkter eller produkter, der kan downloades, kræver normalt ikke forsendelse."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Vælg 'Gem og luk'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Vælg »<strong>« (Gem og luk »</strong>«) for at oprette dit produkt. Produktet vil blive knyttet til denne artikel og være klar til din butik. Du kan altid vende tilbage for at redigere produktoplysningerne."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Tillykke!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Du har oprettet et simpelt J2Commerce-produkt. <br> Der er flere muligheder at udforske, f.eks. at tilføje billeder til produktet. Tjek det ud!</p>"
