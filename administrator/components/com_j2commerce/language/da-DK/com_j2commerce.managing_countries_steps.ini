COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Søg efter lande"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Brug søgefeltet til at finde bestemte lande. <br> Indtast f.eks. »united« for at finde »USA«, »Storbritannien« osv. Tryk derefter på »Enter«."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Aktivér eller deaktiver et land"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Vælg et lands status for at aktivere eller deaktivere det pågældende land."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Markér det øverste afkrydsningsfelt for at vælge alle lande"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Med det pågældende afkrydsningsfelt kan du vælge alle lande på siden. <br> Sørg for, at afkrydsningsfeltet forbliver markeret, for at få adgang til batchfunktionerne i værktøjslinjen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Vælg knappen »Handlinger«"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Med knappen »Handlinger« kan du få adgang til batchhandlinger for de valgte lande."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Vælg indstillingen »Fjern fra offentliggørelse«"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Med indstillingen »Fjern fra offentliggørelse« kan du deaktivere alle valgte lande på én gang."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Tillykke!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Du kan nu administrere de lande, der er tilgængelige i din butik. <br> Hvis du deaktiverer et land, vil kunder fra det pågældende land ikke kunne foretage køb, <br> hvilket kan være nyttigt af forskellige årsager, f.eks. juridiske begrænsninger eller begrænsninger i forbindelse med forsendelse."
