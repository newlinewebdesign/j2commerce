COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Skapa en ny produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Klicka på knappen ”<strong>” (Skapa ny produkt) för att skapa en ny produkt. Då öppnas Joomlas artikelredigerare med J2Commerce-produktformuläret."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Lägg till en produkttitel"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Ange en beskrivande titel för din produkt. Detta är artikelns titel och kommer att visas som produktnamn i din butik."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Välj fliken J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Välj fliken ”<strong>” (J2Commerce-inställningar) under ”</strong>” (Konfiguration) för att komma åt de grundläggande inställningarna för produkten."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Använd artikeln som produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Aktivera alternativet ”Använd som produkt” för att omvandla artikeln till en produkt. <br> Se till att inställningen är ”<strong>” (Ja) </strong> innan du går vidare. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Välj produkttyp"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> I den här genomgången ska vi skapa en enkel produkttyp. <br> Välj ”<strong>” och sedan ”Simple </strong>” i rullgardinsmenyn. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Spara formuläret för att fortsätta"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Välj ”Spara och fortsätt” för att spara ändringen och komma åt produktinformationen. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Välj fliken J2Commerce igen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Klicka på fliken ”<strong>” (J2Commerce-</strong>) för att komma åt de grundläggande produktinställningarna, såsom synlighet, SKU, tillverkare och skatteprofil."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Ställ in produktens synlighet"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Ställ in detta på ”<strong>” (Ja) </strong> för att göra produkten synlig i din butik. Om du väljer ”Nej” finns produkten kvar men visas inte för kunderna."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Ange produktens SKU (lagerhållningsnummer)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Ange ett unikt SKU-nummer för din produkt. Detta är en intern referenskod som används för lageruppföljning och orderhantering."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Ställ in skatteprofilen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Välj rätt skatteprofil för denna produkt. Skatteprofilerna avgör vilka skattesatser som ska tillämpas utifrån kundens plats. Du kan konfigurera skatteprofiler under <strong> J2Commerce &rarr; Skatteprofiler </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Välj fliken Priser"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Välj fliken ”<strong>” (Prissättning) </strong> för att ange produktpriset. Du kan även ställa in avancerade prissättningsregler för kundgrupper och tidsperioder."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Ange ordinarie pris"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Ange det ordinarie försäljningspriset för din produkt. Detta är det grundpris som visas för alla kunder innan eventuella rabatter eller särskilda prisregler tillämpas."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Välj fliken Lager"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Välj fliken ”<strong>” (Lager</strong>) för att hantera lagernivåerna. Där kan du aktivera lagerhantering, ange kvantiteter och ställa in hur restorder ska hanteras."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Hantera lager"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Aktivera ”<strong>” (Hantera lager) </strong> om du vill att J2Commerce ska spåra lagernivåerna för denna produkt. När funktionen är aktiverad minskar antalet enheter vid varje beställning."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Välj fliken ”Frakt”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Välj fliken ”<strong>” (Frakt</strong>) för att ställa in fraktinställningarna för den här produkten, inklusive mått och vikt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Aktivera frakt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Ställ in detta på ”<strong>” (Ja) </strong> om produkten ska skickas fysiskt. Digitala eller nedladdningsbara produkter behöver vanligtvis inte skickas."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Välj ”Spara och stäng”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Välj ”<strong>” (Spara och stäng) </strong> för att skapa din produkt. Produkten kopplas till den här artikeln och är nu redo för din butik. Du kan alltid gå tillbaka och redigera produktinformationen."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Grattis!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Du har skapat en enkel J2Commerce-produkt. <br> Det finns fler alternativ att utforska, till exempel att lägga till bilder till produkten. Kolla in det!</p>"
