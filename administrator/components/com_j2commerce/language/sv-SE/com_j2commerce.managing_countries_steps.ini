COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Sök efter länder"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Använd sökrutan för att hitta specifika länder. <br> Skriv till exempel in ”united” för att hitta ”USA”, ”Storbritannien” osv. Tryck sedan på ”Enter”."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Aktivera eller inaktivera ett land"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Välj status för ett land för att aktivera eller inaktivera det landet."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Markera den översta kryssrutan för att välja alla länder"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Med den här kryssrutan kan du markera alla länder på sidan. <br> Lämna kryssrutan markerad för att få tillgång till gruppåtgärderna i verktygsfältet."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Klicka på knappen ”Åtgärder”"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Med knappen ”Åtgärder” kan du komma åt samlingsåtgärderna för de valda länderna."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Välj alternativet ”Ta bort publicering”"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Med alternativet ”Avaktivera” kan du inaktivera alla valda länder på en gång."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Grattis!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Nu kan du hantera vilka länder som är tillgängliga i din butik. <br> Om du inaktiverar ett land kommer kunder från det landet inte att kunna göra köp, <br> vilket kan vara användbart av olika skäl, till exempel på grund av lagliga restriktioner eller begränsningar i leveransen."
