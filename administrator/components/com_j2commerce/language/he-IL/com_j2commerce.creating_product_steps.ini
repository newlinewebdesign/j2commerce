COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="צור מוצר חדש"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="בחר בלחצן <strong>הוסף מוצר חדש</strong> כדי ליצור מוצר חדש. פעולה זו תפתח את עורך המאמרים של Joomla עם טופס המוצר של J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="הוסף כותרת למוצר"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="הזן כותרת תיאורית למוצר שלך. זו תהיה כותרת הפריט, והיא תוצג כשם המוצר בחנות שלך."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="בחר בלשונית J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="בחר בלשונית <strong>J2Commerce</strong> כדי לגשת להגדרות הראשוניות של המוצר הבסיסי."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="השתמש במאמר כמוצר"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> הפעל את האפשרות 'השתמש כמוצר' כדי להפוך את המאמר למוצר. <br> ודא שהאפשרות מוגדרת ל-<strong> כן </strong> לפני שתמשיך. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="בחר את סוג המוצר"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p>במדריך זה, אנו יוצרים סוג מוצר פשוט. <br>בחר בתפריט הנפתח את האפשרות <strong>Simple</strong>.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="שמור את הטופס כדי להמשיך"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> בחר 'שמור והמשך' כדי להחיל את השינוי ולגשת למידע על המוצר. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="בחר שוב בלשונית J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="בחר בסמל הכרטיסייה <strong>J2Commerce</strong> כדי לגשת להגדרות הליבה של המוצר, כגון נראות, SKU, יצרן ופרופיל מס."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="הגדרת נראות המוצר"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="הגדר את האפשרות הזו ל-<strong>כן</strong> כדי שהמוצר יופיע בחנות שלך. כאשר האפשרות מוגדרת כ-לא, המוצר קיים אך לא יוצג ללקוחות."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="הגדר את מספר ה-SKU (יחידת מלאי) של המוצר"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="הזן מספר SKU ייחודי למוצר שלך. זהו קוד התייחסות פנימי המשמש למעקב אחר המלאי ולניהול הזמנות."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="הגדר את פרופיל המס"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="בחר את פרופיל המס המתאים למוצר זה. פרופילי המס קובעים אילו שיעורי מס חלים בהתאם למיקום הלקוח. ניתן להגדיר פרופילי מס תחת <strong>J2Commerce &rarr; Tax Profiles</strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="בחר בלשונית 'תמחור'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="בחר בלשונית <strong>Pricing</strong> כדי לקבוע את מחיר המוצר. ניתן גם להגדיר כללי תמחור מתקדמים עבור קבוצות לקוחות וטווחי תאריכים."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="הגדר את המחיר הרגיל"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="הזן את מחיר המכירה הרגיל של המוצר שלך. זהו המחיר הבסיסי המוצג לכל הלקוחות לפני הנחות או כללי תמחור מיוחדים."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="בחר בלשונית 'מלאי'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="בחר בלשונית <strong>מלאי</strong> כדי לנהל את רמות המלאי. באפשרותך להפעיל את ניהול המלאי, להגדיר כמויות ולהגדיר את אופן הטיפול בהזמנות בהמתנה."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="ניהול מלאי"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="הפעל את האפשרות <strong>ניהול מלאי</strong> אם ברצונך ש-J2Commerce יעקוב אחר רמות המלאי של מוצר זה. כאשר האפשרות מופעלת, הכמות תפחת עם כל הזמנה."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="בחר בלשונית 'משלוח'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="בחר בלשונית <strong>משלוח</strong> כדי להגדיר את הגדרות המשלוח עבור מוצר זה, כולל מידות ומשקל."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="הפעל משלוח"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="הגדר את האפשרות הזו ל-<strong> כן </strong> אם יש צורך לשלוח את המוצר פיזית. מוצרים דיגיטליים או מוצרים להורדה בדרך כלל אינם מצריכים משלוח."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="בחר 'שמור וסגור'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="בחר <strong>שמור וסגור</strong> כדי ליצור את המוצר שלך. המוצר יצורף למאמר זה ויהיה מוכן לשימוש בחנות שלך. תוכל לחזור בכל עת כדי לערוך את פרטי המוצר."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="מזל טוב!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> יצרת מוצר פשוט ב-J2Commerce. <br> יש עוד אפשרויות ששווה לבדוק, כמו הוספת תמונות למוצר. תבדוק את זה!</p>"
