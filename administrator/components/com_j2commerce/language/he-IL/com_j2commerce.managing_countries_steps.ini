COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="חיפוש לפי מדינות"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="השתמש בתיבת החיפוש כדי למצוא מדינות ספציפיות. <br> לדוגמה, הקלד 'united' כדי למצוא את 'ארצות הברית', 'הממלכה המאוחדת' וכדומה. לאחר מכן לחץ על 'Enter'."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="הפעל או השבת מדינה"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="בחר את הסטטוס של מדינה כדי להפעיל או להשבית אותה."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="סמן את תיבת הסימון העליונה כדי לבחור את כל המדינות"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="תיבת הסימון הזו מאפשרת לך לבחור את כל המדינות המופיעות בעמוד. <br> השאר את תיבת הסימון מסומנת כדי לקבל גישה לפעולות האצווה בסרגל הכלים."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="בחר בלחצן 'פעולות'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="הכפתור 'פעולות' מאפשר לך לגשת לפעולות האצווה עבור המדינות שנבחרו."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="בחר באפשרות 'בטל פרסום'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="האפשרות 'בטל פרסום' מאפשרת לך להשבית את כל המדינות שנבחרו בבת אחת."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="מזל טוב!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="כעת תוכלו לנהל את רשימת המדינות הזמינות בחנות שלכם. <br> השבתת מדינה תמנע מלקוחות מאותה מדינה לבצע רכישות, <br> דבר שיכול להיות שימושי מסיבות שונות, כגון מגבלות חוקיות או מגבלות משלוח."
