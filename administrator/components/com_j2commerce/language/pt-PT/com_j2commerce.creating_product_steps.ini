COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Criar um novo produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Selecione o botão «<strong>» «New» «</strong>» para criar um novo produto. Isto irá abrir o editor de artigos do Joomla com o formulário de produto do J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Adicione um título ao produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Introduza um título descritivo para o seu produto. Este será o título do artigo e será apresentado como o nome do produto na sua loja."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Selecione o separador J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Selecione o separador «<strong>» do J2Commerce «</strong>» para aceder às configurações iniciais do produto principal."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Utilize o artigo como produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Ative a opção «Usar como produto» para transformar o artigo num produto. <br> Certifique-se de que está definido como «<strong>» (Sim) </strong> antes de prosseguir. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Selecione o tipo de produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> Neste tutorial, vamos criar um tipo de produto simples. <br> Selecione «<strong>» e, em seguida, «Simple» </strong> no menu suspenso. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Guarde o formulário para continuar"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Selecione «Guardar e continuar» para aplicar a alteração e aceder às informações do produto. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Selecione novamente o separador J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Selecione o ícone da guia «<strong>» do J2Commerce </strong> para aceder às definições principais do produto, tais como visibilidade, SKU, fabricante e perfil fiscal."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Definir a visibilidade do produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Defina esta opção como «<strong>» (Sim) </strong> para tornar o produto visível na sua loja. Quando definida como «Não», o produto existe, mas não será apresentado aos clientes."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Defina o SKU (Unidade de Gestão de Stock) do produto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Introduza um SKU exclusivo para o seu produto. Trata-se de um código de referência interno utilizado para o acompanhamento do inventário e a gestão de encomendas."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Definir o perfil fiscal"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Selecione o perfil fiscal adequado para este produto. Os perfis fiscais determinam quais as taxas de imposto aplicáveis com base na localização do cliente. Pode configurar os perfis fiscais em <strong> J2Commerce &rarr; Perfis Fiscais </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Selecione o separador «Preços»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Selecione o separador «Preços» (<strong>) em «</strong>» para definir o preço do produto. Também pode configurar regras de preços avançadas para grupos de clientes e intervalos de datas."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Defina o preço normal"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Introduza o preço de venda normal do seu produto. Este é o preço base apresentado a todos os clientes antes de quaisquer descontos ou regras de preços especiais."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Selecione o separador «Inventário»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Selecione o separador «Inventário» (<strong>) «Encomendas em atraso» (</strong>) para gerir os níveis de stock. Pode ativar a gestão de stock, definir quantidades e configurar o comportamento das encomendas em atraso."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Gerir stocks"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Ative a opção «<strong>» (Gerir stock) em «</strong>» se pretender que o J2Commerce acompanhe os níveis de stock deste produto. Quando ativada, a quantidade diminuirá a cada encomenda."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Selecione o separador «Envio»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Selecione o separador «<strong>» (Envio) </strong> para configurar as definições de envio deste produto, incluindo as dimensões e o peso."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Ativar envio"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Defina esta opção como «<strong>» (Sim) ou «</strong>» (Não) consoante o produto necessite ou não de envio físico. Os produtos digitais ou para download normalmente não requerem envio."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Selecione «Guardar e fechar»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Selecione «<strong>» (Salvar e fechar) em «</strong>» para criar o seu produto. O produto será anexado a este artigo e estará pronto para a sua loja. Pode sempre voltar para editar os detalhes do produto."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Parabéns!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Criou um produto simples no J2Commerce. <br> Existem mais opções para explorar, como adicionar imagens ao produto. Dê uma vista de olhos!</p>"
