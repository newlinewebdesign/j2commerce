COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Pesquisar países"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Utilize a caixa de pesquisa para encontrar países específicos. <br> Por exemplo, introduza «united» para encontrar «Estados Unidos», «Reino Unido», etc. Em seguida, prima «Enter»."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Ativar ou desativar um país"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Selecione o estado de um país para ativar ou desativar esse país."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Marque a caixa de seleção superior para selecionar todos os países"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Essa caixa de seleção permite-lhe selecionar todos os países na página. <br> Mantenha a caixa de seleção marcada para ter acesso às ações em lote na barra de ferramentas."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Selecione o botão «Ações»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="O botão «Ações» permite-lhe aceder às ações em lote para os países selecionados."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Selecione a opção «Retirar da publicação»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="A opção «Despublicar» permite-lhe desativar todos os países selecionados de uma só vez."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Parabéns!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Agora pode gerir os países disponíveis na sua loja. <br> A desativação de um país impedirá que os clientes desse país efetuem compras, <br> o que pode ser útil por várias razões, tais como restrições legais ou limitações de envio."
