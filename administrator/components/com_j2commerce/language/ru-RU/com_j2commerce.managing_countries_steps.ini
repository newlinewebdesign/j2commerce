COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Поиск по странам"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Воспользуйтесь полем поиска, чтобы найти нужные страны. <br> Например, введите «united», чтобы найти «Соединенные Штаты», «Соединенное Королевство» и т. д. Затем нажмите «Enter»."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Включить или отключить страну"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Выберите статус страны, чтобы включить или отключить эту страну."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Установите флажок вверху, чтобы выбрать все страны"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Этот флажок позволяет выбрать все страны на странице. <br> Оставьте флажок установленным, чтобы получить доступ к пакетным действиям на панели инструментов."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Нажмите кнопку «Действия»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Кнопка «Действия» позволяет перейти к пакетным операциям для выбранных стран."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Выберите опцию «Отменить публикацию»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="С помощью опции «Отменить публикацию» можно сразу отключить все выбранные страны."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Поздравляем!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Теперь вы можете управлять списком стран, доступных в вашем магазине. <br> Отключение той или иной страны не позволит покупателям из этой страны совершать покупки, <br> что может быть полезно по разным причинам, например, в связи с правовыми ограничениями или ограничениями на доставку."
