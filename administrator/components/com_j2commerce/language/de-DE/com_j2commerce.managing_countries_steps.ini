COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Nach Ländern suchen"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Verwenden Sie das Suchfeld, um bestimmte Länder zu finden. <br> Geben Sie beispielsweise „united“ ein, um „Vereinigte Staaten“, „Vereinigtes Königreich“ usw. zu finden. Drücken Sie anschließend die Eingabetaste."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Ein Land aktivieren oder deaktivieren"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Wählen Sie den Status eines Landes aus, um dieses Land zu aktivieren oder zu deaktivieren."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Aktivieren Sie das oberste Kontrollkästchen, um alle Länder auszuwählen"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Mit diesem Kontrollkästchen können Sie alle Länder auf der Seite auswählen. <br> Lassen Sie das Kontrollkästchen aktiviert, um Zugriff auf die Sammelfunktionen in der Symbolleiste zu erhalten."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Klicken Sie auf die Schaltfläche „Aktionen“"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Über die Schaltfläche „Aktionen“ können Sie auf die Sammelaktionen für die ausgewählten Länder zugreifen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Wählen Sie die Option „Veröffentlichung aufheben“"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Mit der Option „Veröffentlichung rückgängig machen“ können Sie alle ausgewählten Länder auf einmal deaktivieren."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Herzlichen Glückwunsch!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Sie können nun die in Ihrem Shop verfügbaren Länder verwalten. <br> Durch das Deaktivieren eines Landes wird verhindert, dass Kunden aus diesem Land Einkäufe tätigen können, <br> was aus verschiedenen Gründen, wie beispielsweise rechtlichen Beschränkungen oder Versandbeschränkungen, sinnvoll sein kann."
