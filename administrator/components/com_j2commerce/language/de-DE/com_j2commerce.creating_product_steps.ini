COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Ein neues Produkt anlegen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Klicken Sie auf die Schaltfläche „<strong>“ (Neues Produkt) unter „</strong>“ (Artikel), um ein neues Produkt anzulegen. Dadurch wird der Joomla-Artikeleditor mit dem J2Commerce-Produktformular geöffnet."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Produktbezeichnung hinzufügen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Geben Sie einen aussagekräftigen Titel für Ihr Produkt ein. Dies ist der Artikeltitel und wird in Ihrem Shop als Produktname angezeigt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Wählen Sie die Registerkarte „J2Commerce“ aus"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Wählen Sie die Registerkarte „<strong>“ unter „J2Commerce“ > „</strong>“, um auf die Grundeinstellungen des Kernprodukts zuzugreifen."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Verwenden Sie den Artikel als Produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Aktivieren Sie die Option „Als Produkt verwenden“, um den Artikel in ein Produkt umzuwandeln. <br> Vergewissern Sie sich, dass die Einstellung auf „<strong>“ gesetzt ist. </strong> Bevor Sie fortfahren. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Wählen Sie die Produktart aus"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> In dieser Anleitung erstellen wir einen einfachen Produkttyp. <br> Wählen Sie im Dropdown-Menü „<strong>“ und dann „Simple </strong>“ aus. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Speichern Sie das Formular, um fortzufahren"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Wählen Sie „Speichern und fortfahren“, um die Änderung zu übernehmen und auf die Produktinformationen zuzugreifen. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Wählen Sie erneut die Registerkarte „J2Commerce“ aus"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Wählen Sie das Symbol „J2Commerce-</strong>“ unter „<strong>“ aus, um auf die zentralen Produkteinstellungen wie Sichtbarkeit, Artikelnummer, Hersteller und Steuerprofil zuzugreifen."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Sichtbarkeit des Produkts festlegen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Setzen Sie diese Option auf „<strong>“ (Ja) </strong>, damit das Produkt in Ihrem Shop angezeigt wird. Bei der Einstellung „Nein“ ist das Produkt zwar vorhanden, wird den Kunden jedoch nicht angezeigt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Legen Sie die Produkt-SKU (Stock Keeping Unit) fest"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Geben Sie eine eindeutige Artikelnummer für Ihr Produkt ein. Dabei handelt es sich um einen internen Referenzcode, der zur Bestandsverfolgung und Auftragsverwaltung verwendet wird."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Steuerprofil festlegen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Wählen Sie das passende Steuerprofil für dieses Produkt aus. Steuerprofile legen fest, welche Steuersätze je nach Standort des Kunden gelten. Sie können Steuerprofile unter „<strong>“, „J2Commerce“, „&rarr;“ und „Tax Profiles“ konfigurieren."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Wählen Sie die Registerkarte „Preise“"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Wählen Sie die Registerkarte „<strong>-Preise“ (</strong>) aus, um den Produktpreis festzulegen. Sie können auch erweiterte Preisregeln für Kundengruppen und Datumsbereiche konfigurieren."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Den regulären Preis festlegen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Geben Sie den regulären Verkaufspreis für Ihr Produkt ein. Dies ist der Grundpreis, der allen Kunden vor der Anwendung von Rabatten oder Sonderpreisregeln angezeigt wird."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Wählen Sie die Registerkarte „Bestand“"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Wählen Sie die Registerkarte „<strong>-Bestand“ (</strong>) aus, um die Lagerbestände zu verwalten. Dort können Sie die Bestandsverwaltung aktivieren, Mengen festlegen und das Verhalten bei Lieferrückständen konfigurieren."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Lagerbestände verwalten"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Aktivieren Sie „<strong>“ unter „Lagerbestand verwalten“ (</strong>), wenn Sie möchten, dass J2Commerce den Lagerbestand für dieses Produkt erfasst. Bei Aktivierung verringert sich die Menge mit jeder Bestellung."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Wählen Sie die Registerkarte „Versand“"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Wählen Sie die Registerkarte „<strong>“ unter „Versand</strong>“, um die Versandeinstellungen für dieses Produkt zu konfigurieren, einschließlich Abmessungen und Gewicht."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Versand aktivieren"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Stellen Sie dies auf „<strong>“ ein. Wählen Sie „Ja“ unter „</strong>“, wenn das Produkt physisch versendet werden muss. Digitale oder herunterladbare Produkte erfordern in der Regel keinen Versand."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Wählen Sie „Speichern und schließen“"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Wählen Sie „<strong>“ (Produkt speichern und schließen) unter „</strong>“, um Ihr Produkt zu erstellen. Das Produkt wird diesem Artikel hinzugefügt und steht für Ihren Shop bereit. Sie können jederzeit zurückkehren, um die Produktdetails zu bearbeiten."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Herzlichen Glückwunsch!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Sie haben ein einfaches J2Commerce-Produkt erstellt. <br> Es gibt noch weitere Möglichkeiten, die Sie ausprobieren können, beispielsweise das Hinzufügen von Bildern zum Produkt. Schauen Sie sich das an!</p>"
