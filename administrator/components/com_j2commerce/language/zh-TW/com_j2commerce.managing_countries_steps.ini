COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="搜尋國家"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="請使用搜尋欄位來尋找特定國家。<br> 例如，輸入「united」即可搜尋「美國」、「英國」等國家。接著按下「Enter」鍵。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="啟用或停用國家"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="請選擇國家/地區的狀態，以啟用或停用該國家/地區。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="勾選最上方的核取方塊以選取所有國家"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="勾選該核取方塊即可選取頁面上的所有國家。<br> 請保持此核取方塊勾選狀態，以便在工具列中使用批次操作功能。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="點選「動作」按鈕"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="「動作」按鈕可讓您存取所選國家/地區的批次動作。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="選擇「取消發佈」選項"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="「取消發佈」選項可讓您一次停用所有已選中的國家。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="恭喜！"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="您現在可以管理商店中可用的國家/地區。<br> 停用某個國家/地區將阻止該國顧客進行購買，<br> 這在各種情況下都可能派上用場，例如法律限制或運送限制。"
