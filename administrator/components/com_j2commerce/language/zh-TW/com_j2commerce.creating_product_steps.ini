COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="建立新產品"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="點選「<strong>」中的「新增 </strong>」按鈕，以建立新產品。此操作將開啟 Joomla 文章編輯器，並顯示 J2Commerce 產品表單。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="新增產品標題"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="請為您的商品輸入一個描述性標題。此標題將作為文章標題，並在您的商店中顯示為商品名稱。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="選取「J2Commerce」索引標籤"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="請選取「<strong>」中的「J2Commerce」>「</strong>」分頁，以存取核心產品的初始設定。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="將文章作為產品使用"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> 請啟用「用作產品」選項，將文章轉為產品。<br> 請務必確認已設定為「<strong>」為「是」</strong>，再繼續進行。</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="選擇產品類型"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> 在本教學中，我們將建立一個簡單的產品類型。<br> 請從下拉式選單中選擇「<strong> Simple </strong>」。</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="請儲存表單以繼續"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> 請點選「儲存並繼續」以套用變更並查看產品資訊。</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="重新選取「J2Commerce」索引標籤"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="點選「<strong>」的「J2Commerce」</strong> 標籤頁圖示，即可存取核心產品設定，例如產品可見性、SKU、製造商及稅務設定。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="設定產品可見度"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="將此設定設為「<strong>」的「是」</strong>，即可讓商品在您的商店中顯示。若設為「否」，商品雖然存在，但不會顯示給顧客。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="設定產品 SKU（庫存單位）"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="請為您的產品輸入一個唯一的 SKU。這是用於庫存追蹤和訂單管理的內部參考代碼。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="設定稅務設定檔"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="請為此產品選取適當的稅務設定檔。稅務設定檔會根據客戶所在位置，決定應適用哪些稅率。您可以在 <strong> J2Commerce &rarr; Tax Profiles </strong> 下設定稅務設定檔。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="選取「價格」分頁"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="請選取「<strong>」的「定價」</strong> 標籤頁，以設定產品價格。您亦可針對客戶群組和日期範圍設定進階定價規則。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="設定原價"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="請輸入產品的常規售價。這是所有顧客在適用任何折扣或特殊定價規則前所看到的基礎價格。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="選取「庫存」分頁"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="請選取「<strong>」中的「庫存」</strong> 標籤頁來管理庫存數量。您可以啟用庫存管理、設定數量，並配置缺貨訂單的處理方式。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="管理庫存"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="若希望 J2Commerce 追蹤此產品的庫存數量，請啟用 <strong> Manage Stock </strong>。啟用後，每筆訂單完成時，庫存數量將會相應減少。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="選取「運送」分頁"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="請點選「<strong>」的「運送」</strong> 標籤頁，以設定此產品的運送設定，包括尺寸和重量。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="啟用運送服務"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="若產品需要實體運送，請將此設定設為「<strong>」或「</strong>」。數位或可下載產品通常不需要運送。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="選擇「儲存並關閉」"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="選擇「<strong>」，儲存並關閉「</strong>」以建立您的商品。該商品將附加於本文中，並已準備好上架至您的商店。您隨時可以回來編輯商品詳細資訊。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="恭喜！"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> 您已建立了一個簡單的 J2Commerce 產品。<br> 還有更多功能可供探索，例如為產品添加圖片。快來看看吧！</p>"
