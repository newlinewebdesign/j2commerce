COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Rechercher des pays"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Utilisez le champ de recherche pour trouver des pays spécifiques. <br> Par exemple, saisissez « united » pour trouver « États-Unis », « Royaume-Uni », etc. Appuyez ensuite sur « Entrée »."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Activer ou désactiver un pays"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Sélectionnez le statut d'un pays pour l'activer ou le désactiver."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Cochez la case du haut pour sélectionner tous les pays"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Cette case à cocher vous permet de sélectionner tous les pays de la page. <br> Veuillez laisser cette case cochée pour pouvoir accéder aux actions groupées dans la barre d'outils."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Cliquez sur le bouton « Actions »"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Le bouton « Actions » vous permet d'accéder aux actions groupées pour les pays sélectionnés."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Sélectionnez l'option « Retirer de la publication »"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="L'option « Désactiver la publication » vous permet de désactiver tous les pays sélectionnés en une seule fois."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Félicitations !"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Vous pouvez désormais gérer les pays disponibles dans votre boutique. <br> La désactivation d'un pays empêchera les clients de ce pays d'effectuer des achats, <br> ce qui peut s'avérer utile pour diverses raisons, telles que des restrictions légales ou des limitations en matière d'expédition."
