COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Créer un nouveau produit"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Cliquez sur le bouton « <strong> New » (Créer un nouveau produit) pour créer un nouveau produit. Cela ouvrira l'éditeur d'articles Joomla avec le formulaire de produit J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Ajouter un titre de produit"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Entrez un titre descriptif pour votre produit. Il s'agit du titre de l'article, qui apparaîtra comme nom du produit dans votre boutique."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Sélectionnez l'onglet J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Sélectionnez l'onglet « J2Commerce » (<strong>) dans « Configuration » (</strong>) pour accéder aux paramètres initiaux du produit de base."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Utilisez l'article comme produit"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Activez l'option « Utiliser comme produit » pour transformer l'article en produit. <br> Assurez-vous que l'option « <strong> » est bien réglée sur « Oui » </strong> avant de continuer. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Sélectionnez le type de produit"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> Dans ce tutoriel, nous allons créer un type de produit simple. <br> Sélectionnez « <strong> » puis « Simple </strong> » dans le menu déroulant. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Enregistrez le formulaire pour continuer"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Sélectionnez « Enregistrer et continuer » pour appliquer la modification et accéder aux informations sur le produit. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Sélectionnez à nouveau l'onglet J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Cliquez sur l'icône de l'onglet « J2Commerce » (<strong>) de l'</strong> pour accéder aux paramètres principaux du produit, tels que la visibilité, la référence (SKU), le fabricant et le profil fiscal."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Définir la visibilité du produit"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Réglez ce paramètre sur « <strong> » (Oui) </strong> pour que le produit soit visible dans votre boutique. Si vous sélectionnez « Non », le produit existe mais ne sera pas affiché aux clients."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Définissez la référence du produit (SKU)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Veuillez saisir une référence produit unique pour votre produit. Il s'agit d'un code de référence interne utilisé pour le suivi des stocks et la gestion des commandes."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Définir le profil fiscal"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Sélectionnez le profil fiscal approprié pour ce produit. Les profils fiscaux déterminent les taux d'imposition applicables en fonction de la localisation du client. Vous pouvez configurer les profils fiscaux sous <strong> J2Commerce &rarr; Profils fiscaux </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Sélectionnez l'onglet « Tarifs »"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Sélectionnez l'onglet « Tarification » (<strong>) de l'</strong> pour définir le prix du produit. Vous pouvez également configurer des règles de tarification avancées pour des groupes de clients et des plages de dates."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Définissez le prix normal"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Veuillez saisir le prix de vente normal de votre produit. Il s'agit du prix de base affiché pour tous les clients avant l'application de toute remise ou règle tarifaire particulière."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Sélectionnez l'onglet « Stock »"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Sélectionnez l'onglet « Gestion des stocks » (<strong>) dans l'onglet « Gestion des stocks » (</strong>) pour gérer les niveaux de stock. Vous pouvez activer la gestion des stocks, définir les quantités et configurer le comportement en cas de rupture de stock."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Gérer les stocks"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Activez l'option « Gérer les stocks » (<strong>) </strong> si vous souhaitez que J2Commerce suive les niveaux de stock de ce produit. Une fois cette option activée, la quantité diminuera à chaque commande."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Sélectionnez l'onglet « Expédition »"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Sélectionnez l'onglet « <strong> » (</strong>s d'expédition) pour configurer les paramètres d'expédition de ce produit, notamment ses dimensions et son poids."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Activer la livraison"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Sélectionnez « <strong> » (Oui) </strong> si le produit doit être expédié physiquement. Les produits numériques ou téléchargeables ne nécessitent généralement pas d'expédition."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Sélectionnez « Enregistrer et fermer »"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Sélectionnez « <strong> », puis cliquez sur « Save and Close » (</strong>) pour créer votre produit. Le produit sera associé à cet article et prêt à être mis en vente dans votre boutique. Vous pouvez à tout moment revenir pour modifier les détails du produit."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Félicitations !"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Vous venez de créer un produit J2Commerce simple. <br> Il existe d'autres options à découvrir, comme l'ajout d'images au produit. Jetez-y un œil !</p>"
