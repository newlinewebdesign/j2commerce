COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Søk etter land"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Bruk søkefeltet til å finne bestemte land. <br> Skriv for eksempel inn «united» for å finne «USA», «Storbritannia» osv. Trykk deretter på «Enter»."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Aktiver eller deaktiver et land"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Velg statusen til et land for å aktivere eller deaktivere det landet."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Merk av i den øverste avmerkingsboksen for å velge alle land"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Med denne avmerkingsboksen kan du velge alle landene på siden. <br> La avmerkingsboksen være merket av for å få tilgang til samlingshandlingene i verktøylinjen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Velg «Handlinger»-knappen"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Med «Handlinger»-knappen får du tilgang til samlingshandlingene for de valgte landene."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Velg alternativet «Fjern publisering»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Med alternativet «Fjern publisering» kan du deaktivere alle valgte land på en gang."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Gratulerer!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Du kan nå administrere hvilke land som er tilgjengelige i nettbutikken din. <br> Hvis du deaktiverer et land, vil kunder fra det landet ikke kunne foreta kjøp, <br> noe som kan være nyttig av ulike årsaker, for eksempel på grunn av lovmessige restriksjoner eller begrensninger i fraktmulighetene."
