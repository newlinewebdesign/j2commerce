COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Opprett et nytt produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Velg knappen «<strong>» (Ny produkt) for å opprette et nytt produkt. Dette åpner Joomla-artikkelredigereren med J2Commerce-produktskjemaet."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Legg til en produkttittel"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Skriv inn en beskrivende tittel for produktet ditt. Dette er artikkelens tittel og vil vises som produktnavnet i nettbutikken din."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Velg fanen J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Velg fanen «<strong>» under «J2Commerce» – «</strong>» for å få tilgang til de grunnleggende innstillingene for kjerneproduktet."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Bruk artikkelen som produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Aktiver alternativet «Bruk som produkt» for å gjøre artikkelen om til et produkt. <br> Sørg for at den er satt til «<strong>» Ja </strong> før du fortsetter. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Velg produkttype"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> I denne veiledningen skal vi opprette en enkel produkttype. <br> Velg «<strong>» og deretter «Simple </strong>» fra rullegardinmenyen. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Lagre skjemaet for å fortsette"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Velg «Lagre og fortsett» for å lagre endringen og få tilgang til produktinformasjonen. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Velg fanen J2Commerce på nytt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Velg fanen «<strong>» i J2Commerce (</strong>) for å få tilgang til de viktigste produktinnstillingene, som synlighet, SKU, produsent og skatteprofil."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Angi produktets synlighet"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Sett denne innstillingen til «<strong>» (Ja) </strong> for å gjøre produktet synlig i butikken din. Når innstillingen er satt til «Nei», finnes produktet, men vises ikke for kundene."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Angi produktets SKU (lagerbeholdningsenhet)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Skriv inn en unik SKU for produktet ditt. Dette er en intern referansekode som brukes til lagerstyring og ordrehåndtering."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Angi skatteprofil"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Velg riktig skatteprofil for dette produktet. Skatteprofilene avgjør hvilke skattesatser som gjelder, basert på kundens beliggenhet. Du kan konfigurere skatteprofiler under <strong> J2Commerce &rarr; Skatteprofiler </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Velg fanen «Priser»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Velg fanen «<strong>» under «Priser» (</strong>) for å angi produktprisen. Du kan også konfigurere avanserte prisregler for kundegrupper og datointervaller."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Angi standardpris"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Angi den vanlige salgsprisen for produktet ditt. Dette er grunnprisen som vises for alle kunder før eventuelle rabatter eller spesielle prisregler."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Velg fanen «Lager»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Velg fanen «<strong>» (Lagerbeholdning) under «</strong>» (Lagerbeholdning) for å administrere lagernivåene. Her kan du aktivere lagerstyring, angi antall og konfigurere hvordan restordrer skal håndteres."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Administrer lagerbeholdninger"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Aktiver «<strong>» under «Manage Stock» </strong> hvis du ønsker at J2Commerce skal spore lagernivået for dette produktet. Når denne funksjonen er aktivert, vil antallet reduseres for hver bestilling."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Velg fanen «Frakt»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Velg fanen «<strong>» (Frakt</strong>) for å konfigurere fraktinnstillingene for dette produktet, inkludert mål og vekt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Aktiver frakt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Velg «<strong>» (Ja) </strong> hvis produktet skal sendes fysisk. Digitale eller nedlastbare produkter krever vanligvis ikke frakt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Velg «Lagre og lukk»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Velg «<strong>» (Lagre og lukk) </strong> for å opprette produktet. Produktet blir knyttet til denne artikkelen og er klart for bruk i nettbutikken din. Du kan når som helst gå tilbake for å redigere produktopplysningene."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Gratulerer!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Du har opprettet et enkelt J2Commerce-produkt. <br> Det finnes flere funksjoner du kan utforske, for eksempel å legge til bilder til produktet. Ta en titt!</p>"
