COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Hae maita"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Käytä hakukenttää tiettyjen maiden etsimiseen. <br> Kirjoita esimerkiksi sana ”united”, jos haluat etsiä ”Yhdysvallat”, ”Yhdistynyt kuningaskunta” jne. Paina sitten Enter-näppäintä."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Ota maa käyttöön tai poista se käytöstä"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Valitse maan tila, jotta voit ottaa kyseisen maan käyttöön tai poistaa sen käytöstä."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Valitse ylin valintaruutu, jos haluat valita kaikki maat"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Tämän valintaruudun avulla voit valita kaikki sivulla olevat maat. <br> Jätä valintaruutu valituksi, jotta saat käyttöösi työkalurivin joukkotoiminnot."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Valitse ”Toiminnot”-painike"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="”Toiminnot”-painikkeella pääset käyttämään valittujen maiden joukkotoimintoja."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Valitse vaihtoehto ”Poista julkaisusta”"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="”Poista julkaisu” -vaihtoehdon avulla voit poistaa kaikki valitut maat käytöstä kerralla."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Onnittelut!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Voit nyt hallita verkkokaupassasi käytettävissä olevia maita. <br> Maan poistaminen käytöstä estää kyseisen maan asiakkaita tekemästä ostoksia, <br> mikä voi olla hyödyllistä monista syistä, kuten lainsäädännöllisten rajoitusten tai toimitusrajoitusten vuoksi."
