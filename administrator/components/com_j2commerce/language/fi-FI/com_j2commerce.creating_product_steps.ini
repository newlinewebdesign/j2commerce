COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Luo uusi tuote"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Luo uusi tuote valitsemalla valikko<strong>Uusi</strong>. Tämä avaa Joomlan artikkelieditorin, jossa näkyy J2Commerce-tuotelomake."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Lisää tuotteen nimi"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Kirjoita tuotteellesi kuvaava otsikko. Tämä on artikkelin otsikko, ja se näkyy verkkokaupassasi tuotteen nimenä."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Valitse J2Commerce-välilehti"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Käytä artikkelia tuotteena"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Valitse tuotetyyppi"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Tallenna lomake jatkaaksesi"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Valitse ”Tallenna ja jatka”, jotta muutokset tulevat voimaan ja pääset tuotetietoihin. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Valitse uudelleen J2Commerce-välilehti"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Määritä tuotteen näkyvyys"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Määritä tuotteen SKU (varastoyksikkö)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Anna tuotteellesi yksilöllinen SKU-koodi. Se on sisäinen viitekoodi, jota käytetään varastoseurannassa ja tilausten hallinnassa."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Määritä veroprofiili"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Valitse tälle tuotteelle sopiva veroprofiili. Veroprofiilit määrittävät, mitä verokantoja sovelletaan asiakkaan sijainnin perusteella. Voit määrittää veroprofiileja kohdassa <strong> J2Commerce &rarr; Veroprofiilit </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Valitse Hinnat-välilehti"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Määritä normaalihinta"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Syötä tuotteesi normaali myyntihinta. Tämä on perushinta, joka näkyy kaikille asiakkaille ennen alennuksia tai erityisiä hinnoittelusääntöjä."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Valitse Varasto-välilehti"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Varastojen hallinta"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Valitse Toimitus-välilehti"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Ota toimitus käyttöön"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Valitse ”Tallenna ja sulje”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Onnittelut!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Olet luonut yksinkertaisen J2Commerce-tuotteen. <br> Tarjolla on vielä muita vaihtoehtoja, kuten kuvien lisääminen tuotteeseen. Tutustu niihin!</p>"
