COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Ülkeleri ara"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Belirli ülkeleri bulmak için arama kutusunu kullanın. <br> Örneğin, \"United\" yazarak \"Amerika Birleşik Devletleri\", \"Birleşik Krallık\" vb. ülkeleri bulabilirsiniz. Ardından \"Enter\" tuşuna basın."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Bir ülkeyi etkinleştir veya devre dışı bırak"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Bir ülkenin durumunu seçerek o ülkeyi etkinleştirin veya devre dışı bırakın."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Tüm ülkeleri seçmek için en üstteki onay kutusunu işaretleyin"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Bu onay kutusu, sayfadaki tüm ülkeleri seçmenizi sağlar. <br> Araç çubuğundaki toplu işlemlere erişebilmek için bu onay kutusunu işaretli tutun."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="\"İşlemler\" düğmesini seçin"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="\"Eylemler\" düğmesi, seçilen ülkeler için toplu işlemlere erişmenizi sağlar."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="\"Yayından Kaldır\" seçeneğini seçin"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="\"Yayınlamayı Kaldır\" seçeneği, seçilen tüm ülkeleri tek seferde devre dışı bırakmanızı sağlar."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Tebrikler!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Artık mağazanızda mevcut olan ülkeleri yönetebilirsiniz. <br> Bir ülkeyi devre dışı bırakmak, o ülkedeki müşterilerin alışveriş yapmasını engeller; <br> bu durum, yasal kısıtlamalar veya nakliye sınırlamaları gibi çeşitli nedenlerle faydalı olabilir."
