COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Yeni bir ürün oluştur"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Ürün başlığı ekle"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Ürününüz için açıklayıcı bir başlık girin. Bu, ürünün başlığıdır ve mağazanızda ürün adı olarak gösterilecektir."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="J2Commerce sekmesini seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Makaleyi ürün olarak kullanın"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Ürün türünü seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Devam etmek için formu kaydedin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Değişikliği uygulamak ve ürün bilgilerine erişmek için \"Kaydet ve Devam Et\" seçeneğini seçin. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="J2Commerce sekmesini yeniden seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Görünürlük, SKU, üretici ve vergi profili gibi temel ürün ayarlarına erişmek için <strong> J2Commerce </strong> sekme simgesini seçin."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Ürünün görünürlüğünü ayarla"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Ürünün SKU'sunu (Stok Tutma Birimi) girin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Ürününüz için benzersiz bir SKU girin. Bu, stok takibi ve sipariş yönetimi için kullanılan dahili bir referans kodudur."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Vergi profilini ayarla"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Bu ürün için uygun vergi profilini seçin. Vergi profilleri, müşterinin bulunduğu yere göre hangi vergi oranlarının uygulanacağını belirler. Vergi profillerini şu adresten yapılandırabilirsiniz: <strong> J2Commerce &rarr; Vergi Profilleri </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="\"Fiyatlandırma\" sekmesini seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Normal fiyatı belirleyin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Ürününüzün normal satış fiyatını girin. Bu, herhangi bir indirim veya özel fiyatlandırma kuralı uygulanmadan önce tüm müşterilere gösterilen temel fiyattır."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Envanter sekmesini seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Stokları yönet"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="\"Kargo\" sekmesini seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Kargo seçeneğini etkinleştir"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="\"Kaydet ve Kapat\" seçeneğini seçin"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Tebrikler!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Basit bir J2Commerce ürünü oluşturdunuz. <br> Ürüne resim eklemek gibi keşfedebileceğiniz daha fazla seçenek var. Bir göz atın!</p>"
