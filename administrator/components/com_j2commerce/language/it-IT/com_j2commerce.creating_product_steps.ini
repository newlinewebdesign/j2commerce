COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Creare un nuovo prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Selezioni il pulsante \"<strong>\" (Nuovo) > \"</strong>\" (Prodotto) per creare un nuovo prodotto. Si aprirà l'editor di articoli di Joomla con il modulo del prodotto J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Aggiungere il titolo di un prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Inserisca un titolo descrittivo per il suo prodotto. Questo sarà il titolo dell'articolo e verrà visualizzato come nome del prodotto nel suo negozio."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Selezioni la scheda J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Selezioni la scheda \"<strong>\" (Configurazione) di J2Commerce </strong> per accedere alle impostazioni iniziali del prodotto principale."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Utilizzi l'articolo come prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Attivi l'opzione \"Usa come prodotto\" per trasformare l'articolo in un prodotto. <br> Si assicuri che sia impostato su <strong> Sì </strong> prima di proseguire. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Selezionare il tipo di prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> In questo tour creeremo un semplice tipo di prodotto. <br> Selezionare \"<strong>\" e \"Simple </strong>\" dal menu a tendina. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Salvi il modulo per continuare"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Selezioni \"Salva e continua\" per applicare la modifica e accedere alle informazioni sul prodotto. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Selezioni nuovamente la scheda J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Selezioni l'icona della scheda \"J2Commerce\" (<strong>) in \"</strong>\" per accedere alle impostazioni principali del prodotto, quali visibilità, SKU, produttore e profilo fiscale."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Impostare la visibilità del prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Impostare questa opzione su \"<strong>\" (Sì) </strong> per rendere il prodotto visibile nel Suo negozio. Se impostata su \"No\", il prodotto esiste ma non verrà mostrato ai clienti."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Impostare il codice SKU (Stock Keeping Unit) del prodotto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Inserisca un codice SKU univoco per il suo prodotto. Si tratta di un codice di riferimento interno utilizzato per il monitoraggio delle scorte e la gestione degli ordini."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Impostare il profilo fiscale"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Selezioni il profilo fiscale appropriato per questo prodotto. I profili fiscali determinano quali aliquote fiscali applicare in base alla posizione del cliente. È possibile configurare i profili fiscali alla voce \"<strong>\" > \"J2Commerce\" > \"&rarr;\" > \"Tax Profiles\" > \"</strong>\"."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Selezioni la scheda \"Prezzi\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Selezioni la scheda \"Prezzi\" (<strong>) all'interno di \"</strong>\" per impostare il prezzo del prodotto. È inoltre possibile configurare regole di prezzo avanzate per gruppi di clienti e intervalli di date."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Impostare il prezzo normale"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Inserisca il prezzo di vendita standard del suo prodotto. Si tratta del prezzo base mostrato a tutti i clienti prima dell'applicazione di eventuali sconti o regole di prezzo speciali."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Selezioni la scheda \"Inventario\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Selezionare la scheda \"Inventario\" (<strong>) > \"Gestione delle scorte\" (</strong>) per gestire i livelli delle scorte. È possibile attivare la gestione delle scorte, impostare le quantità e configurare il comportamento degli ordini in arretrato."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Gestire le scorte"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Attivi l'opzione \"Gestione delle scorte\" (<strong>) </strong> se desidera che J2Commerce tenga traccia dei livelli di magazzino per questo prodotto. Una volta attivata, la quantità diminuirà ad ogni ordine."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Selezioni la scheda \"Spedizione\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Selezioni la scheda \"Spedizione\" (<strong>) e poi \"Dettagli di spedizione\" (</strong>) per configurare le impostazioni di spedizione relative a questo prodotto, comprese le dimensioni e il peso."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Abilitare la spedizione"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Impostare questa opzione su \"<strong>\" (Sì) </strong> se il prodotto deve essere spedito fisicamente. I prodotti digitali o scaricabili in genere non richiedono la spedizione."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Selezionare \"Salva e chiudi\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Selezioni \"<strong>\" (Salva e chiudi), quindi \"</strong>\" (Salva e chiudi) per creare il Suo prodotto. Il prodotto verrà allegato a questo articolo e sarà pronto per il Suo negozio. Potrà tornare in qualsiasi momento per modificare i dettagli del prodotto."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Congratulazioni!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Ha creato un semplice prodotto J2Commerce. <br> Ci sono altre opzioni da scoprire, come l'aggiunta di immagini al prodotto. Dia un'occhiata!</p>"
