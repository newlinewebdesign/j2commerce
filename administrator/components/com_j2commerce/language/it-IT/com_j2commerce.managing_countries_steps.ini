COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Cerca per paese"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Utilizzi la casella di ricerca per trovare paesi specifici. <br> Ad esempio, digiti \"united\" per trovare \"Stati Uniti\", \"Regno Unito\", ecc. Quindi prema \"Invio\"."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Attivare o disattivare un paese"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Selezionare lo stato di un paese per attivarlo o disattivarlo."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Selezioni la casella di controllo in alto per selezionare tutti i paesi"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Quella casella di selezione specifica consente di selezionare tutti i paesi presenti nella pagina. <br> Mantenga la casella selezionata per poter accedere alle azioni in blocco nella barra degli strumenti."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Selezioni il pulsante \"Azioni\""
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Il pulsante \"Azioni\" consente di accedere alle azioni in blocco relative ai paesi selezionati."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Selezioni l'opzione \"Rimuovi dalla pubblicazione\""
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="L'opzione \"Annulla pubblicazione\" consente di disattivare contemporaneamente tutti i paesi selezionati."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Congratulazioni!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Ora è possibile gestire i paesi disponibili nel proprio negozio. <br> Disattivando un paese, si impedirà ai clienti di quel paese di effettuare acquisti, <br> il che può risultare utile per vari motivi, quali restrizioni legali o limitazioni relative alla spedizione."
