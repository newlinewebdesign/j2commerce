COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Een nieuw product aanmaken"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Klik op de knop '<strong>' en vervolgens op '</strong>' om een nieuw product aan te maken. Hierdoor wordt de Joomla-artikeleditor geopend met het J2Commerce-productformulier."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Voeg een producttitel toe"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Voer een beschrijvende titel voor uw product in. Dit is de titel van het artikel en wordt in uw winkel weergegeven als de productnaam."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Selecteer het tabblad J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Selecteer het tabblad '<strong>' in J2Commerce (</strong>) om de standaardinstellingen van het kernproduct te openen."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Gebruik het artikel als product"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Schakel de optie 'Als product gebruiken' in om het artikel om te zetten in een product. <br> Zorg ervoor dat de instelling is ingesteld op '<strong>' Ja </strong> voordat u verdergaat. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Selecteer het producttype"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> In deze tutorial maken we een eenvoudig producttype aan. <br> Selecteer in de vervolgkeuzelijst ‘<strong>’ en vervolgens ‘Simple </strong>’. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Sla het formulier op om verder te gaan"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Kies 'Opslaan en doorgaan' om de wijziging toe te passen en de productinformatie te bekijken. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Selecteer opnieuw het tabblad J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Klik op het tabbladpictogram '<strong>' van J2Commerce </strong> om de belangrijkste productinstellingen te openen, zoals zichtbaarheid, SKU, fabrikant en belastingprofiel."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="De zichtbaarheid van het product instellen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Stel dit in op '<strong>' (Ja) </strong> om het product in uw winkel weer te geven. Wanneer u 'Nee' selecteert, bestaat het product wel, maar wordt het niet aan klanten getoond."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Stel de product-SKU (Stock Keeping Unit) in"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Voer een unieke SKU voor uw product in. Dit is een interne referentiecode die wordt gebruikt voor voorraadbeheer en orderafhandeling."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Stel het belastingprofiel in"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Selecteer het juiste belastingprofiel voor dit product. Belastingprofielen bepalen welke belastingtarieven van toepassing zijn op basis van de locatie van de klant. U kunt belastingprofielen configureren via <strong> J2Commerce &rarr; Tax Profiles </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Selecteer het tabblad 'Prijzen'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Ga naar het tabblad '<strong>-prijzen' (</strong>) om de productprijs in te stellen. U kunt ook geavanceerde prijsregels instellen voor klantgroepen en datumbereiken."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Stel de normale prijs in"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Voer de normale verkoopprijs van uw product in. Dit is de basisprijs die aan alle klanten wordt getoond, vóór eventuele kortingen of speciale prijsregels."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Selecteer het tabblad 'Voorraad'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Ga naar het tabblad '<strong>' (Voorraad) en vervolgens naar '</strong>' (Voorraadbeheer) om de voorraadniveaus te beheren. U kunt het voorraadbeheer inschakelen, hoeveelheden instellen en het gedrag bij nabestellingen configureren."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Voorraadbeheer"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Schakel '<strong>' in via 'Beheer voorraad' </strong> als u wilt dat J2Commerce de voorraadniveaus voor dit product bijhoudt. Wanneer deze optie is ingeschakeld, wordt de voorraad bij elke bestelling bijgewerkt."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Selecteer het tabblad 'Verzending'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Ga naar het tabblad '<strong>' (Verzending) en vervolgens naar '</strong>' (Verzendopties) om de verzendinstellingen voor dit product te configureren, waaronder de afmetingen en het gewicht."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Verzending inschakelen"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Stel dit in op '<strong>' Ja </strong> als het product fysiek moet worden verzonden. Digitale of downloadbare producten hoeven doorgaans niet te worden verzonden."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Kies 'Opslaan en sluiten'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Kies '<strong>' en klik op 'Opslaan en sluiten' </strong> om uw product aan te maken. Het product wordt aan dit artikel gekoppeld en is klaar voor uw winkel. U kunt de productgegevens op elk moment weer bewerken."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Gefeliciteerd!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> U hebt een eenvoudig J2Commerce-product aangemaakt. <br> Er zijn nog meer mogelijkheden om te ontdekken, zoals het toevoegen van afbeeldingen aan het product. Neem eens een kijkje!</p>"
