COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Zoek naar landen"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Gebruik het zoekvak om specifieke landen te vinden. <br> Voer bijvoorbeeld 'united' in om 'Verenigde Staten', 'Verenigd Koninkrijk' enz. te vinden. Druk vervolgens op 'Enter'."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Een land in- of uitschakelen"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Selecteer de status van een land om dat land in of uit te schakelen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Vink het bovenste selectievakje aan om alle landen te selecteren"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Met dat specifieke selectievakje kunt u alle landen op de pagina selecteren. <br> Laat het selectievakje aangevinkt om toegang te krijgen tot de batchacties in de werkbalk."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Klik op de knop 'Acties'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Via de knop 'Acties' kunt u de batchacties voor de geselecteerde landen openen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Kies de optie 'Verwijderen uit publicatie'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Met de optie 'Verwijderen' kunt u alle geselecteerde landen in één keer uitschakelen."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Gefeliciteerd!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="U kunt nu de landen beheren die in uw winkel beschikbaar zijn. <br> Als u een land uitschakelt, kunnen klanten uit dat land geen aankopen doen, <br> wat om verschillende redenen nuttig kan zijn, zoals wettelijke beperkingen of verzendbeperkingen."
