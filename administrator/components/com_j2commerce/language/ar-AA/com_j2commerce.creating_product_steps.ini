COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="إنشاء منتج جديد"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="انقر على زر إنشاء منتج جديد لإنشاء منتج جديد. سيؤدي ذلك إلى فتح محرر مقالات Joomla مع نموذج منتج J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="أضف عنوان المنتج"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="أدخل عنوانًا وصفياً لمنتجك. هذا هو عنوان المقال وسيتم عرضه كاسم للمنتج في متجرك"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="حدد علامة التبويب J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="حدد علامة التبويب J2Commerce للوصول إلى الإعدادات الأولية للمنتج الأساسي"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="استخدم المادة كمنتج"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p>قم بتفعيل خيار \"استخدام كمنتج\" لتحويل المقالة إلى منتج. <br>تأكد من ضبط الإعداد على نعم قبل المتابعة.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="اختر نوع المنتج"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p>في هذه الجولة، سنقوم بإنشاء نوع منتج بسيط. <br>اختر Simple من القائمة المنسدلة.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="احفظ النموذج للمتابعة"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> اختر \"حفظ ومتابعة\" لتطبيق التغيير والوصول إلى معلومات المنتج. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="أعد تحديد علامة التبويب J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="اختر أيقونة علامة التبويب J2Commerce للوصول إلى إعدادات المنتج الأساسية مثل حالة الظهور، ورمز المنتج (SKU)، والشركة المصنعة، وملف تعريف الضرائب"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="تحديد مستوى ظهور المنتج"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="اضبط هذا الخيار على نعم لجعل المنتج مرئيًا في متجرك. وعند ضبطه على \"لا\"، يظل المنتج موجودًا ولكنه لن يظهر للعملاء"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="تحديد رمز المنتج (SKU)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="أدخل رمز SKU فريدًا لمنتجك. هذا الرمز هو رمز مرجعي داخلي يُستخدم لتتبع المخزون وإدارة الطلبات"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="تعيين ملف تعريف الضرائب"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="حدد ملف الضرائب المناسب لهذا المنتج. تحدد ملفات الضرائب معدلات الضرائب المطبقة بناءً على موقع العميل. يمكنك تكوين ملفات الضرائب من خلال الرابط التالي: J2Commerce &rarr; ملفات الضرائب"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="اختر علامة التبويب \"الأسعار\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="اختر علامة التبويب Pricing لتعيين سعر المنتج. يمكنك أيضًا تكوين قواعد تسعير متقدمة لمجموعات العملاء ونطاقات التواريخ"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="تحديد السعر العادي"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="أدخل السعر العادي لمنتجك. وهو السعر الأساسي الذي يظهر لجميع العملاء قبل تطبيق أي خصومات أو قواعد تسعير خاصة"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="اختر علامة التبويب \"المخزون\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="اختر علامة التبويب المخزون لإدارة مستويات المخزون. يمكنك تفعيل إدارة المخزون، وتحديد الكميات، وتهيئة إعدادات الطلبات المؤجلة"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="إدارة المخزون"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="قم بتفعيل إدارة المخزون إذا كنت تريد أن يقوم J2Commerce بتتبع مستويات المخزون لهذا المنتج. عند تفعيل هذه الميزة، ستنخفض الكمية مع كل طلب"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="اختر علامة التبويب \"الشحن\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="حدد علامة التبويب الشحن لتكوين إعدادات الشحن لهذا المنتج، بما في ذلك الأبعاد والوزن"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="تمكين الشحن"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="اضبط هذا الخيار على نعم إذا كان المنتج يتطلب شحنًا فعليًّا. لا تتطلب المنتجات الرقمية أو القابلة للتنزيل عادةً أي شحن"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="اختر \"حفظ وإغلاق\""
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="اختر Save and Close لإنشاء منتجك. سيتم إرفاق المنتج بهذه المقالة وسيكون جاهزًا لمتجرك. يمكنك دائمًا العودة لتعديل تفاصيل المنتج"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="تهانينا"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> لقد أنشأت منتجًا بسيطًا في J2Commerce. <br> وهناك المزيد من الخيارات التي يمكنك استكشافها، مثل إضافة صور إلى المنتج. اطلع عليها!</p>"
