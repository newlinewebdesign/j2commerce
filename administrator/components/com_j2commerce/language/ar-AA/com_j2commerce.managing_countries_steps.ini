COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="البحث عن البلدان"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="استخدم مربع البحث للعثور على بلدان معينة. <br> على سبيل المثال، أدخل كلمة \"united\" للعثور على \"الولايات المتحدة\" و\"المملكة المتحدة\" وما إلى ذلك. ثم اضغط على مفتاح \"Enter\""
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="تمكين أو تعطيل بلد ما"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="حدد حالة البلد لتفعيله أو تعطيله"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="حدد مربع الاختيار العلوي لاختيار جميع البلدان"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="يتيح لك مربع الاختيار هذا تحديد جميع البلدان الموجودة على الصفحة. <br> احتفظ بمربع الاختيار محددًا لتتمكن من الوصول إلى الإجراءات الجماعية في شريط الأدوات"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="اختر زر \"الإجراءات\""
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="يتيح لك زر \"الإجراءات\" الوصول إلى الإجراءات الجماعية الخاصة بالبلدان المحددة"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="اختر خيار \"إلغاء النشر\""
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="يتيح لك خيار \"إلغاء النشر\" تعطيل جميع البلدان المحددة دفعة واحدة"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="تهانينا"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="يمكنك الآن إدارة البلدان المتاحة في متجرك. <br> سيؤدي تعطيل بلد ما إلى منع العملاء من ذلك البلد من إجراء عمليات شراء، <br> وهو ما قد يكون مفيدًا لأسباب متنوعة مثل القيود القانونية أو قيود الشحن"