COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Crear un nuevo producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Añada el título del producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Introduzca un título descriptivo para su producto. Este será el título del artículo y aparecerá como nombre del producto en su tienda."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Seleccione la pestaña J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Utilice el artículo como producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Active la opción «Usar como producto» para convertir el artículo en un producto. <br> Asegúrese de que está configurado en <strong> Sí </strong> antes de continuar. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Seleccione el tipo de producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Guarde el formulario para continuar"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Seleccione «Guardar y continuar» para aplicar el cambio y acceder a la información del producto. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Vuelva a seleccionar la pestaña J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Establecer la visibilidad del producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Establezca el SKU (código de referencia) del producto"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Introduzca un SKU único para su producto. Se trata de un código de referencia interno que se utiliza para el seguimiento del inventario y la gestión de pedidos."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Configure el perfil fiscal"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Seleccione el perfil fiscal adecuado para este producto. Los perfiles fiscales determinan qué tipos impositivos se aplican en función de la ubicación del cliente. Puede configurar los perfiles fiscales en <strong> J2Commerce &rarr; Perfiles fiscales </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Seleccione la pestaña «Precios»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Establezca el precio habitual"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Introduzca el precio de venta habitual de su producto. Se trata del precio base que se muestra a todos los clientes antes de aplicar cualquier descuento o regla de precios especial."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Seleccione la pestaña «Inventario»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Gestionar existencias"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Seleccione la pestaña «Envío»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Habilitar el envío"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Seleccione «Guardar y cerrar»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="¡Enhorabuena!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Ha creado un producto sencillo en J2Commerce. <br> Hay más opciones que puede explorar, como añadir imágenes al producto. ¡Échele un vistazo!</p>"
