COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Buscar países"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Utilice el cuadro de búsqueda para encontrar países concretos. <br> Por ejemplo, escriba «united» para encontrar «Estados Unidos», «Reino Unido», etc. A continuación, pulse «Intro»."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Activar o desactivar un país"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Seleccione el estado de un país para activarlo o desactivarlo."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Marque la casilla superior para seleccionar todos los países"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Esa casilla de verificación le permite seleccionar todos los países de la página. <br> Mantenga la casilla marcada para poder acceder a las acciones por lotes de la barra de herramientas."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Seleccione el botón «Acciones»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="El botón «Acciones» le permite acceder a las acciones en bloque para los países seleccionados."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Seleccione la opción «Dejarlo de publicar»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="La opción «Desactivar publicación» le permite desactivar todos los países seleccionados a la vez."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="¡Enhorabuena!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Ahora puede gestionar los países disponibles en su tienda. <br> Si desactiva un país, los clientes de ese país no podrán realizar compras, <br> lo cual puede resultar útil por diversos motivos, como restricciones legales o limitaciones de envío."
