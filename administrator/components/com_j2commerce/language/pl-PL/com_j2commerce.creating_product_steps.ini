COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Utwórz nowy produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Proszę kliknąć przycisk „<strong>” (Dodaj nowy produkt) w sekcji „</strong>” (Produkty), aby utworzyć nowy produkt. Spowoduje to otwarcie edytora artykułów Joomla z formularzem produktu J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Wprowadź nazwę produktu"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Proszę wprowadzić opisowy tytuł produktu. Będzie to tytuł artykułu i zostanie wyświetlony jako nazwa produktu w Państwa sklepie."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Proszę wybrać zakładkę J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Proszę przejść do zakładki „<strong>” w J2Commerce (</strong>), aby uzyskać dostęp do podstawowych ustawień początkowych produktu."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Proszę wykorzystać ten artykuł jako produkt"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Proszę włączyć opcję „Użyj jako produkt”, aby przekształcić artykuł w produkt. <br> Proszę upewnić się, że ustawiono opcję „<strong>” na „Tak” </strong> przed przejściem dalej. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Proszę wybrać rodzaj produktu"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> W ramach tego samouczka utworzymy prosty typ produktu. <br> Z listy rozwijanej wybierz opcję „<strong>” (Typ produktu) oraz „Simple” (Prosty) </strong>. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Proszę zapisać formularz, aby kontynuować"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Proszę wybrać opcję „Zapisz i kontynuuj”, aby zastosować zmianę i uzyskać dostęp do informacji o produkcie. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Proszę ponownie wybrać zakładkę J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Proszę kliknąć ikonę zakładki „<strong>” w J2Commerce (</strong>), aby uzyskać dostęp do podstawowych ustawień produktu, takich jak widoczność, numer SKU, producent i profil podatkowy."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Ustaw widoczność produktu"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Aby produkt był widoczny w Państwa sklepie, proszę ustawić opcję „<strong>” na „Yes” (). W przypadku ustawienia opcji na „No” produkt będzie istniał, ale nie będzie wyświetlany klientom."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Proszę wprowadzić numer SKU (jednostka magazynowa) produktu"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Proszę wprowadzić unikalny numer SKU dla Państwa produktu. Jest to wewnętrzny kod referencyjny służący do śledzenia stanów magazynowych i zarządzania zamówieniami."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Ustaw profil podatkowy"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Proszę wybrać odpowiedni profil podatkowy dla tego produktu. Profile podatkowe określają, jakie stawki podatkowe mają zastosowanie w zależności od lokalizacji klienta. Profile podatkowe można skonfigurować w sekcji „<strong>” (Ustawienia > J2Commerce > &rarr; > Profile podatkowe) </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Proszę wybrać zakładkę „Ceny”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Proszę przejść do zakładki „Ceny” (<strong>) w sekcji „Ceny” (</strong>), aby ustawić cenę produktu. Można również skonfigurować zaawansowane reguły cenowe dla grup klientów i przedziałów czasowych."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Ustal standardową cenę"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Proszę wprowadzić standardową cenę sprzedaży produktu. Jest to cena podstawowa wyświetlana wszystkim klientom przed zastosowaniem jakichkolwiek rabatów lub specjalnych zasad cenowych."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Proszę wybrać zakładkę „Zapasy”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Aby zarządzać stanami magazynowymi, proszę przejść do zakładki „<strong>” (Zarządzanie zapasami) w sekcji „</strong>” (Zapasy). Można tam włączyć funkcję zarządzania zapasami, ustawić ilości oraz skonfigurować sposób postępowania w przypadku niedoborów."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Zarządzanie zapasami"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Włącz opcję „<strong>” (Zarządzaj stanem magazynowym) </strong>, jeśli chcą Państwo, aby J2Commerce śledziło stan magazynowy tego produktu. Po włączeniu tej opcji ilość produktu będzie się zmniejszać wraz z każdym zamówieniem."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Proszę wybrać zakładkę „Wysyłka”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Proszę przejść do zakładki „<strong>” (Wysyłka) w sekcji „</strong>” (Informacje o produkcie), aby skonfigurować ustawienia wysyłki dla tego produktu, w tym wymiary i wagę."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Włącz wysyłkę"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Proszę ustawić opcję „<strong>” na „Yes” </strong>, jeśli produkt wymaga fizycznej wysyłki. Produkty cyfrowe lub dostępne do pobrania zazwyczaj nie wymagają wysyłki."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Proszę wybrać opcję „Zapisz i zamknij”"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Proszę wybrać opcję „<strong>”, a następnie kliknąć „Zapisz i zamknij” (</strong>), aby utworzyć produkt. Produkt zostanie dołączony do tego artykułu i będzie gotowy do umieszczenia w Państwa sklepie. W każdej chwili mogą Państwo powrócić do edycji szczegółów produktu."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Gratulacje!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Utworzyli Państwo prosty produkt w J2Commerce. <br> Dostępnych jest więcej opcji, które warto sprawdzić, na przykład dodawanie zdjęć do produktu. Zapraszamy do zapoznania się z nimi!</p>"
