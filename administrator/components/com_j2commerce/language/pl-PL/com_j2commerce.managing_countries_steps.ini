COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Wyszukiwanie krajów"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Proszę skorzystać z pola wyszukiwania, aby znaleźć konkretne kraje. <br> Na przykład proszę wpisać „united”, aby znaleźć „Stany Zjednoczone”, „Wielką Brytanię” itp. Następnie proszę nacisnąć klawisz „Enter”."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Włącz lub wyłącz kraj"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Proszę wybrać status danego kraju, aby go włączyć lub wyłączyć."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Proszę zaznaczyć górne pole wyboru, aby wybrać wszystkie kraje"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="To pole wyboru pozwala zaznaczyć wszystkie kraje na stronie. <br> Proszę pozostawić to pole zaznaczone, aby uzyskać dostęp do funkcji zbiorczych na pasku narzędzi."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Proszę kliknąć przycisk „Działania”"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Przycisk „Działania” umożliwia dostęp do funkcji zbiorczych dla wybranych krajów."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Proszę wybrać opcję „Ukryj”"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Opcja „Ukryj” pozwala na jednoczesne wyłączenie wszystkich wybranych krajów."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Gratulacje!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Teraz mogą Państwo zarządzać listą krajów dostępnych w Państwa sklepie. <br> Wyłączenie danego kraju uniemożliwi klientom z tego kraju dokonywanie zakupów, <br> co może być przydatne z różnych powodów, takich jak ograniczenia prawne lub ograniczenia dotyczące wysyłki."
