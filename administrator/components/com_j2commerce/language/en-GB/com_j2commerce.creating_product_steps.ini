COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Create a new product"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Select the <strong>New</strong> button to create a new product. This will open the Joomla article editor with the J2Commerce product form."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Add a product title"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Enter a descriptive title for your product. This is the article title and will be displayed as the product name in your store."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Select the J2Commerce general tab"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Select the <strong>J2Commerce</strong> tab to access the core product settings like visibility, SKU, manufacturer, and tax profile."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Use the article as product"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p>Enable the 'Use as product' option to transform the article into a product.<br>Make sure it’s set to <strong>Yes</strong> before moving on.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Select the product type"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p>In this tour, we are creating a simple product type.<br>Select <strong>Simple</strong> from the dropdown.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Save the form to continue"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p>Select 'Save and Continue' to apply the change and access product information.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Set product visibility"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Set this to <strong>Yes</strong> to make the product visible in your storefront. When set to No, the product exists but won't be shown to customers."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Set the product SKU (Stock Keeping Unit)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Enter a unique SKU for your product. This is an internal reference code used for inventory tracking and order management."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Set the tax profile"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Select the appropriate tax profile for this product. Tax profiles determine which tax rates apply based on the customer's location. You can configure tax profiles under <strong>J2Commerce &rarr; Tax Profiles</strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Select the pricing tab"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Select the <strong>Pricing</strong> tab to set the product price. You can also configure advanced pricing rules for customer groups and date ranges."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Set the regular price"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Enter the regular selling price for your product. This is the base price shown to all customers before any discounts or special pricing rules."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Select the inventory tab"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Select the <strong>Inventory</strong> tab to manage stock levels. You can enable stock management, set quantities, and configure backorder behaviour."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Manage stocks"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Enable <strong>Manage Stock</strong> if you want J2Commerce to track inventory levels for this product. When enabled, the quantity will decrease with each order."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Select the shipping tab"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Select the <strong>Shipping</strong> tab to configure shipping settings for this product, including dimensions and weight."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Enable shipping"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Set this to <strong>Yes</strong> if the product needs to be physically shipped. Digital or downloadable products typically don't need shipping."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Select 'Save and Close'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Select <strong>Save and Close</strong> to create your product. The product will be attached to this article and ready for your store. You can always come back to edit the product details."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Congratulations!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="<p>You have created a simple J2Commerce product.<br>There are more options to explore, like adding images to the product. Check it out!</p>"
