COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Δημιουργία νέου προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Προσθήκη τίτλου προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Εισάγετε έναν περιγραφικό τίτλο για το προϊόν σας. Αυτός είναι ο τίτλος του προϊόντος και θα εμφανίζεται ως το όνομα του προϊόντος στο κατάστημά σας."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Επιλέξτε την καρτέλα J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Χρησιμοποιήστε το άρθρο ως προϊόν"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Επιλέξτε τον τύπο προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Αποθηκεύστε τη φόρμα για να συνεχίσετε"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Επιλέξτε «Αποθήκευση και συνέχιση» για να εφαρμόσετε την αλλαγή και να δείτε τις πληροφορίες του προϊόντος. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Επιλέξτε ξανά την καρτέλα J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Ρύθμιση ορατότητας προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Ορίστε τον κωδικό SKU (Stock Keeping Unit) του προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Εισάγετε έναν μοναδικό κωδικό SKU για το προϊόν σας. Πρόκειται για έναν εσωτερικό κωδικό αναφοράς που χρησιμοποιείται για την παρακολούθηση των αποθεμάτων και τη διαχείριση των παραγγελιών."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Ορισμός του φορολογικού προφίλ"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Επιλέξτε το κατάλληλο φορολογικό προφίλ για αυτό το προϊόν. Τα φορολογικά προφίλ καθορίζουν τους φορολογικούς συντελεστές που ισχύουν ανάλογα με την τοποθεσία του πελάτη. Μπορείτε να διαμορφώσετε τα φορολογικά προφίλ στη διεύθυνση <strong> J2Commerce &rarr; Tax Profiles </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Επιλέξτε την καρτέλα «Τιμές»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Ορίστε την κανονική τιμή"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Εισάγετε την κανονική τιμή πώλησης του προϊόντος σας. Αυτή είναι η βασική τιμή που εμφανίζεται σε όλους τους πελάτες πριν από τυχόν εκπτώσεις ή ειδικούς κανόνες τιμολόγησης."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Επιλέξτε την καρτέλα «Αποθέματα»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Διαχείριση αποθεμάτων"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Επιλέξτε την καρτέλα «Αποστολή»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Ενεργοποίηση αποστολής"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Επιλέξτε «Αποθήκευση και κλείσιμο»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Συγχαρητήρια!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Δημιουργήσατε ένα απλό προϊόν στο J2Commerce. <br> Υπάρχουν κι άλλες επιλογές που μπορείτε να εξερευνήσετε, όπως η προσθήκη εικόνων στο προϊόν. Ρίξτε μια ματιά!</p>"
