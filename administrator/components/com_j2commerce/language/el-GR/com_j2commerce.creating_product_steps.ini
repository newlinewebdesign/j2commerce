COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Δημιουργία νέου προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Επιλέξτε το κουμπί «<strong>» (Δημιουργία νέου προϊόντος) για να δημιουργήσετε ένα νέο προϊόν. Αυτό θα ανοίξει τον επεξεργαστή άρθρων του Joomla με τη φόρμα προϊόντος του J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Προσθήκη τίτλου προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Εισάγετε έναν περιγραφικό τίτλο για το προϊόν σας. Αυτός είναι ο τίτλος του προϊόντος και θα εμφανίζεται ως το όνομα του προϊόντος στο κατάστημά σας."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Επιλέξτε την καρτέλα J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Επιλέξτε την καρτέλα «<strong>» (Διαχείριση προϊόντων) στο J2Commerce (</strong>) για να αποκτήσετε πρόσβαση στις αρχικές ρυθμίσεις των βασικών προϊόντων."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Χρησιμοποιήστε το άρθρο ως προϊόν"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> Ενεργοποιήστε την επιλογή «Χρήση ως προϊόν» για να μετατρέψετε το άρθρο σε προϊόν. <br> Βεβαιωθείτε ότι έχει οριστεί η επιλογή «<strong>» (Ναι) </strong> πριν προχωρήσετε. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Επιλέξτε τον τύπο προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> Σε αυτό το σεμινάριο, θα δημιουργήσουμε έναν απλό τύπο προϊόντος. <br> Επιλέξτε «<strong>» και στη συνέχεια «Simple </strong>» από το αναπτυσσόμενο μενού. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Αποθηκεύστε τη φόρμα για να συνεχίσετε"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Επιλέξτε «Αποθήκευση και συνέχιση» για να εφαρμόσετε την αλλαγή και να δείτε τις πληροφορίες του προϊόντος. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Επιλέξτε ξανά την καρτέλα J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Επιλέξτε το εικονίδιο της καρτέλας «<strong>» (Διαχείριση προϊόντων) στο J2Commerce </strong> για να αποκτήσετε πρόσβαση στις βασικές ρυθμίσεις του προϊόντος, όπως ορατότητα, κωδικός SKU, κατασκευαστής και φορολογικό προφίλ."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Ρύθμιση ορατότητας προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Ορίστε την επιλογή «<strong>» (Εμφάνιση στο κατάστημα) σε «Ναι» () για να εμφανίζεται το προϊόν στο κατάστημά σας. Όταν η επιλογή είναι «Όχι» (No), το προϊόν υπάρχει αλλά δεν εμφανίζεται στους πελάτες."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Ορίστε τον κωδικό SKU (Stock Keeping Unit) του προϊόντος"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Εισάγετε έναν μοναδικό κωδικό SKU για το προϊόν σας. Πρόκειται για έναν εσωτερικό κωδικό αναφοράς που χρησιμοποιείται για την παρακολούθηση των αποθεμάτων και τη διαχείριση των παραγγελιών."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Ορισμός του φορολογικού προφίλ"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Επιλέξτε το κατάλληλο φορολογικό προφίλ για αυτό το προϊόν. Τα φορολογικά προφίλ καθορίζουν τους φορολογικούς συντελεστές που ισχύουν ανάλογα με την τοποθεσία του πελάτη. Μπορείτε να διαμορφώσετε τα φορολογικά προφίλ στη διεύθυνση <strong> J2Commerce &rarr; Tax Profiles </strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Επιλέξτε την καρτέλα «Τιμές»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Επιλέξτε την καρτέλα «Τιμολόγηση» (<strong>) στο «Διαχείριση τιμών» (</strong>) για να ορίσετε την τιμή του προϊόντος. Μπορείτε επίσης να ρυθμίσετε προηγμένους κανόνες τιμολόγησης για ομάδες πελατών και χρονικά διαστήματα."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Ορίστε την κανονική τιμή"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Εισάγετε την κανονική τιμή πώλησης του προϊόντος σας. Αυτή είναι η βασική τιμή που εμφανίζεται σε όλους τους πελάτες πριν από τυχόν εκπτώσεις ή ειδικούς κανόνες τιμολόγησης."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Επιλέξτε την καρτέλα «Αποθέματα»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Επιλέξτε την καρτέλα «<strong>» (Διαχείριση αποθεμάτων) > «</strong>» (Διαχείριση αποθεμάτων) για να διαχειριστείτε τα επίπεδα αποθεμάτων. Μπορείτε να ενεργοποιήσετε τη διαχείριση αποθεμάτων, να ορίσετε ποσότητες και να ρυθμίσετε τη συμπεριφορά των εκκρεμών παραγγελιών."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Διαχείριση αποθεμάτων"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Ενεργοποιήστε την επιλογή «Διαχείριση αποθεμάτων» (<strong>) στη διεύθυνση </strong> αν θέλετε το J2Commerce να παρακολουθεί τα επίπεδα αποθεμάτων για αυτό το προϊόν. Όταν η επιλογή είναι ενεργοποιημένη, η ποσότητα θα μειώνεται με κάθε παραγγελία."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Επιλέξτε την καρτέλα «Αποστολή»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Επιλέξτε την καρτέλα «Αποστολή» (<strong>) και στη συνέχεια την καρτέλα «Διαμόρφωση αποστολής» (</strong>) για να ρυθμίσετε τις παραμέτρους αποστολής αυτού του προϊόντος, συμπεριλαμβανομένων των διαστάσεων και του βάρους."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Ενεργοποίηση αποστολής"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Ορίστε την επιλογή «<strong>» (Ναι) </strong> εάν το προϊόν πρέπει να αποσταλεί φυσικά. Τα ψηφιακά ή τα προς λήψη προϊόντα συνήθως δεν απαιτούν αποστολή."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Επιλέξτε «Αποθήκευση και κλείσιμο»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Επιλέξτε «<strong>» (Δημιουργία νέου προϊόντος), πατήστε «Save and Close» (Αποθήκευση και κλείσιμο) στο «</strong>» (Διαχείριση προϊόντων) για να δημιουργήσετε το προϊόν σας. Το προϊόν θα προστεθεί σε αυτό το άρθρο και θα είναι έτοιμο για το κατάστημά σας. Μπορείτε πάντα να επιστρέψετε για να επεξεργαστείτε τις λεπτομέρειες του προϊόντος."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Συγχαρητήρια!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Δημιουργήσατε ένα απλό προϊόν στο J2Commerce. <br> Υπάρχουν κι άλλες επιλογές που μπορείτε να εξερευνήσετε, όπως η προσθήκη εικόνων στο προϊόν. Ρίξτε μια ματιά!</p>"
