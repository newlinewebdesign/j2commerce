COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Αναζήτηση χωρών"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Χρησιμοποιήστε το πεδίο αναζήτησης για να βρείτε συγκεκριμένες χώρες. <br> Για παράδειγμα, πληκτρολογήστε «united» για να βρείτε τις «Ηνωμένες Πολιτείες», το «Ηνωμένο Βασίλειο» κ.λπ. Στη συνέχεια, πατήστε το πλήκτρο «Enter»."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Ενεργοποίηση ή απενεργοποίηση μιας χώρας"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Επιλέξτε την κατάσταση μιας χώρας για να ενεργοποιήσετε ή να απενεργοποιήσετε τη συγκεκριμένη χώρα."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Επιλέξτε το πάνω πλαίσιο ελέγχου για να επιλέξετε όλες τις χώρες"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="Αυτό το συγκεκριμένο πλαίσιο επιλογής σας επιτρέπει να επιλέξετε όλες τις χώρες της σελίδας. <br> Αφήστε το πλαίσιο επιλογής επιλεγμένο για να έχετε πρόσβαση στις μαζικές ενέργειες στη γραμμή εργαλείων."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Επιλέξτε το κουμπί «Ενέργειες»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="Το κουμπί «Ενέργειες» σας επιτρέπει να αποκτήσετε πρόσβαση στις μαζικές ενέργειες για τις επιλεγμένες χώρες."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Επιλέξτε την επιλογή «Απόσυρση δημοσίευσης»"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="Η επιλογή «Ακύρωση δημοσίευσης» σάς επιτρέπει να απενεργοποιήσετε όλες τις επιλεγμένες χώρες ταυτόχρονα."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Συγχαρητήρια!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="Τώρα μπορείτε να διαχειριστείτε τις χώρες που είναι διαθέσιμες στο κατάστημά σας. <br> Η απενεργοποίηση μιας χώρας θα εμποδίσει τους πελάτες από τη συγκεκριμένη χώρα να πραγματοποιήσουν αγορές, <br> κάτι που μπορεί να είναι χρήσιμο για διάφορους λόγους, όπως νομικοί περιορισμοί ή περιορισμοί αποστολής."
