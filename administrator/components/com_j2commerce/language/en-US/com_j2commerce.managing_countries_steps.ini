COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="Search for countries"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="Use the search box to find specific countries.<br>For instance, enter 'united' to find 'United States', 'United Kingdom', etc. Then press 'Enter'."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="Enable or disable a country"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="Select the status of a country to enable or disable that country."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="Select the top checkbox to select all countries"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="That specific checkbox allows you to select all countries on the page.<br>Keep the checkbox selected to receive access to the batch actions in the toolbar."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="Select the 'Actions' button"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="The 'Actions' button allows you to access the batch actions for the selected countries."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="Select the 'Unpublish' option"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="The 'Unpublish' option allows you to disable all selected countries at once."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="Congratulations!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="You can now manage the countries available in your store.<br>Disabling a country will prevent customers from that country from making purchases,<br>which can be useful for various reasons such as legal restrictions or shipping limitations."
