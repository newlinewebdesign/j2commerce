COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="国を検索"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="特定の国を検索するには、検索ボックスをご利用ください。<br> たとえば、「united」と入力すると、「アメリカ合衆国」や「イギリス」などが表示されます。その後、「Enter」キーを押してください。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="国を有効にする、または無効にする"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="国のステータスを選択して、その国を有効または無効にしてください。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="すべての国を選択するには、一番上のチェックボックスを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="このチェックボックスをオンにすると、ページ上のすべての国を選択できます。<br> ツールバーのバッチ操作機能を利用するには、このチェックボックスをオンにしたままにしてください。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="「アクション」ボタンを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="「アクション」ボタンをクリックすると、選択した国に対する一括操作を実行できます。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="「公開を取り消す」オプションを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="「公開取り消し」オプションを使用すると、選択したすべての国を一括で無効にすることができます。"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="おめでとうございます！"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="ストアで利用可能な国を管理できるようになりました。<br> 国を無効にすると、その国の顧客は購入できなくなります。<br> これは、法的規制や配送の制限など、さまざまな理由で役立つ場合があります。"
