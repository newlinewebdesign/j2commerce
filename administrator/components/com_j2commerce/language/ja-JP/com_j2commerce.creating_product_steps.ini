COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="新しい商品を作成する"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="「<strong>」の「New </strong>」ボタンを選択して、新しい商品を作成します。これにより、J2Commerceの商品フォームが表示されたJoomla記事エディタが開きます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="商品のタイトルを入力してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="商品の説明的なタイトルを入力してください。これは記事のタイトルとなり、ストアでは商品名として表示されます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="「J2Commerce」タブを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="「<strong>」の「J2Commerce」タブ内の「</strong>」を選択すると、製品の基本設定画面にアクセスできます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="その記事を商品として活用する"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p> 「商品として使用する」オプションを有効にして、記事を商品に変換してください。<br> 次に進む前に、設定が「<strong>」になっていることを確認してください。</strong> </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="製品タイプを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p> このチュートリアルでは、シンプルなプロダクトタイプを作成します。<br> ドロップダウンから「<strong> Simple </strong>」を選択します。</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="フォームを保存して続行してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> 変更を適用して製品情報にアクセスするには、「保存して続行」を選択してください。</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="「J2Commerce」タブを再度選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="「<strong>」の「J2Commerce」タブ（</strong>）のアイコンを選択すると、表示設定、SKU、メーカー、税設定などの主要な製品設定にアクセスできます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="商品の公開設定"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="この設定を「<strong>」の「Yes」に設定すると、</strong> を通じてストアで商品が表示されます。「No」に設定した場合、商品は存在しますが、顧客には表示されません。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="商品のSKU（在庫管理単位）を設定する"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="商品に固有のSKUを入力してください。これは、在庫管理や注文管理に使用される内部参照コードです。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="税プロファイルを設定する"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="この商品に適切な税プロファイルを選択してください。税プロファイルは、顧客の所在地に基づいて適用される税率を決定します。税プロファイルの設定は、<strong> J2Commerce &rarr; Tax Profiles </strong> で行えます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="「価格」タブを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="「<strong>」の「価格設定」タブ（</strong>）を選択して、商品価格を設定します。また、顧客グループや期間に応じた詳細な価格設定ルールを設定することもできます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="通常価格を設定する"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="商品の通常販売価格を入力してください。これは、割引や特別価格の適用前の、すべての顧客に表示される基本価格です。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="「在庫」タブを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="在庫レベルを管理するには、「<strong>」の「</strong>」タブを選択します。ここで、在庫管理を有効にしたり、数量を設定したり、バックオーダーの処理方法を設定したりできます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="在庫管理"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="J2Commerceでこの商品の在庫数を追跡したい場合は、「<strong>」の「Manage Stock」</strong> を有効にしてください。有効にすると、注文があるたびに在庫数が減ります。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="「配送」タブを選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="「<strong>」の「</strong>」タブを選択し、この商品の寸法や重量などの配送設定を行ってください。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="配送を有効にする"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="商品を物理的に発送する必要がある場合は、これを「<strong>」に設定し、「</strong>」に設定してください。デジタル商品やダウンロード可能な商品は、通常、発送の必要がありません。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="「保存して閉じる」を選択してください"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="「<strong>」を選択し、「</strong>」を保存して閉じると、商品が作成されます。商品は本記事に紐付けられ、ストアでの販売準備が整います。商品の詳細情報はいつでも編集できます。"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="おめでとうございます！"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> シンプルなJ2Commerceの商品を1つ作成しました。<br> 商品に画像を追加するなど、他にも試せるオプションがあります。ぜひチェックしてみてください！</p>"
