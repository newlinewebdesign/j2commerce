PLG_SYSTEM_J2COMMERCE="System - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="System plugin that provides core J2Commerce functionality including cart session management, JavaScript initialization, version class injection, and background inventory control cron tasks."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Basic Options"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Leaflet Map"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Schema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Settings"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Enable Version Class"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Add J2Commerce version class to the body tag on frontend J2Commerce pages. This allows for version-specific CSS targeting."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Clear Cache on Cart Update"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Automatically clear page cache when the shopping cart is modified. This ensures users always see current cart data."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Enable Inventory Cron"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Run a daily inventory control task to cancel unpaid orders past their deadline and restore inventory. This runs automatically on page load when 24 hours have passed since the last run."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Inventory control cron task executed."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Cart migrated for logged-in user."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Page cache cleared after cart update."

