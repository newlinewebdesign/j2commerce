; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Haalt de laatste wisselkoersen van valuta op van de geconfigureerde API-provider en werkt alle ingeschakelde valuta bij. Configureer de API provider in de J2Commerce Currency Updater app plugin."
