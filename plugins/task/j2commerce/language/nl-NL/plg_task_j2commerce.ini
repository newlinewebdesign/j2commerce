; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Verwijdert onvolledige orders (status: Nieuw) die ouder zijn dan het opgegeven aantal dagen. Alle gerelateerde ordergegevens (artikelen, attributen, verzending, belasting, enz.) worden in cascade verwijderd."
