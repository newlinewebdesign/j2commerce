PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Προεπισκόπηση των στοιχείων που θα διαγραφούν χωρίς πραγματική διαγραφή."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Διαγραφή αρχείων καταγραφής παλαιότερων από (ημέρες)"
