; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Usuwa niekompletne zamówienia (status: Nowe), które są starsze niż określona liczba dni. Wszystkie powiązane dane zamówienia (pozycje, atrybuty, wysyłka, podatek itp.) są usuwane kaskadowo."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Przebieg próbny"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Po włączeniu zadanie zgłasza, które zamówienia zostaną usunięte bez ich faktycznego usuwania. Proszę wyłączyć, aby wykonać rzeczywiste usunięcie."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Starsze niż (dni)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Usuwa porzucone zlecenia starsze niż tyle dni. Proszę ustawić na 0, aby usunąć wszystkie zamówienia ze statusem Nowe bez względu na wiek."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Usuń porzucone zamówienia"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Pobiera najnowsze kursy wymiany walut od skonfigurowanego dostawcy API i aktualizuje wszystkie włączone waluty. Proszę skonfigurować dostawcę API we wtyczce aplikacji J2Commerce Currency Updater."
