PLG_TASK_J2COMMERCE="Task - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Automated maintenance tasks for J2Commerce. Includes cleanup of abandoned orders and other scheduled routines."

; Cleanup Order Uploads routine
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Removes customer-uploaded order files according to retention rules."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Cleanup Mode"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Choose which set of uploads to sweep."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="Delete DB Rows"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="When enabled, removes the #__j2commerce_uploads row along with the file. When disabled, keeps the row with status='deleted' so admins retain an audit trail."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Dry Run"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Preview which files would be deleted without actually removing anything. Conservative default — flip to No when you are ready to act."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Retention Days (Attached)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Keep attached order files for at least this many days after the order's last status change."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Order Statuses"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Only sweep attached files for orders in these statuses. No selection means no attached-files sweep."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Retention Days (Orphans)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="Pending uploads older than this many days are treated as orphans and removed regardless of expires_on."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Attached uploads only"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Both (orphans + attached)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Orphan tmp uploads only"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Clean up order upload files"

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Deletes old queue execution logs and completed queue items to keep the database clean."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Dry Run"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Preview what would be deleted without actually deleting."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Delete Logs Older Than (Days)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Log entries older than this will be deleted."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Purge Completed Items Older Than (Days)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Completed queue items older than this will be deleted."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Cleanup Queue Logs"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Processes pending items in the J2Commerce queue. Creates execution logs for auditing."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Batch Size"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Maximum number of queue items to process per execution."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Queue Type"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Process only this queue type. Leave empty to process all types."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="e.g., shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Release Stale Locks (Minutes)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Release processing locks older than this many minutes. Prevents items from getting permanently stuck."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Process Queue"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Deletes incomplete orders (status: New) that are older than the specified number of days. All related order data (items, attributes, shipping, tax, etc.) is cascade-deleted."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Dry Run"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="When enabled, the task reports which orders would be deleted without actually deleting them. Disable to perform real deletions."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Older Than (Days)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Delete abandoned orders older than this many days. Set to 0 to delete all orders with New status regardless of age."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Remove Abandoned Orders"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Fetches the latest currency exchange rates from the configured API provider and updates all enabled currencies. Configure the API provider in the J2Commerce Currency Updater app plugin."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Update Currency Exchange Rates"
