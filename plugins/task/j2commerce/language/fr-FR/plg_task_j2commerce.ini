PLG_TASK_J2COMMERCE="Tâche - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Tâches de maintenance automatisées pour J2Commerce. Comprend le nettoyage des commandes abandonnées et d'autres routines programmées."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Supprime les anciens journaux d'exécution de la file d'attente et les éléments terminés de la file d'attente afin de maintenir la base de données propre."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Exécution à sec"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Prévisualise ce qui sera supprimé sans le faire réellement."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Supprimer les journaux de plus de (jours)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Les entrées de journal plus anciennes que ce nombre seront supprimées."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Purger les éléments terminés datant de plus de (jours)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Les éléments terminés de la file d'attente plus anciens que cette date seront supprimés."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce : Nettoyer les journaux de la file d'attente"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Traite les éléments en attente dans la file d'attente de J2Commerce. Crée des journaux d'exécution pour l'audit."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Taille du lot"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Nombre maximum d'éléments de la file d'attente à traiter par exécution."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Type de file d'attente"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Traiter uniquement ce type de file d'attente. Laissez vide pour traiter tous les types."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="par exemple, shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Libérer les verrous périmés (minutes)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Libère les verrous de traitement datant de plus de ce nombre de minutes. Empêche les éléments d'être bloqués de façon permanente."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce : File d'attente de traitement"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Supprime les commandes incomplètes (statut : Nouveau) qui sont plus anciennes que le nombre de jours spécifié. Toutes les données relatives à la commande (articles, attributs, expédition, taxes, etc.) sont supprimées en cascade."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Exécution à sec"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Lorsqu'elle est activée, la tâche signale les commandes à supprimer sans les supprimer réellement. Désactivez-la pour effectuer des suppressions réelles."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Plus vieux que (jours)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Supprime les commandes abandonnées datant de plus de ce nombre de jours. Mettez la valeur 0 pour supprimer toutes les commandes avec le statut Nouveau, quel que soit leur âge."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce : Supprimer les commandes abandonnées"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Récupère les derniers taux de change à partir du fournisseur API configuré et met à jour toutes les devises activées. Configurez le fournisseur API dans le plugin de l'application J2Commerce Currency Updater."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce : Mettre à jour les taux de change"
