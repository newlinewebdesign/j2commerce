; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="指定された日数以上前の未完了の注文（ステータス：新規）を削除します。関連するすべての注文データ（商品、属性、送料、税金など）はカスケード削除されます。"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="ドライ・ラン"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="有効にすると、タスクは実際に削除することなく、どの注文が削除されるかを報告します。無効にすると、実際に削除されます。"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="より古い（日数）"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="この日数より古い放棄された注文を削除します。0に設定すると、日数に関係なく「新規」ステータスの注文をすべて削除します。"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce：放置された注文を削除する"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="設定されたAPIプロバイダーから最新の為替レートを取得し、すべての有効通貨を更新します。J2Commerce Currency UpdaterアプリのプラグインでAPIプロバイダーを設定します。"
