; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="刪除超過指定天數的未完成訂單 (狀態：新)。所有相關的訂單資料 (項目、屬性、運費、稅項等) 都會被逐級刪除。"
