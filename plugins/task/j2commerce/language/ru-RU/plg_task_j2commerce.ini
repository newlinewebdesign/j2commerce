PLG_TASK_J2COMMERCE="Задача - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Автоматизированные задачи обслуживания для J2Commerce. Включает в себя очистку заброшенных заказов и другие запланированные процедуры."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Удаляет старые журналы выполнения очередей и завершенные элементы очередей, чтобы сохранить базу данных чистой."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Сухой запуск"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Предварительный просмотр того, что будет удалено, без фактического удаления."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Удалить журналы старше (дней)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Записи в журнале старше этого значения будут удалены."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Удалить завершенные элементы старше (дней)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Завершенные элементы очереди старше этого значения будут удалены."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Очистка журналов очередей"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Обрабатывает отложенные элементы в очереди J2Commerce. Создает журналы выполнения для аудита."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Размер партии"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Максимальное количество элементов очереди для обработки за одно выполнение."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Тип очереди"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Обрабатывайте только этот тип очереди. Оставьте пустым, чтобы обрабатывать все типы."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="например, shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Освободить несвежие замки (минуты)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Освободите замки обработки, которые устарели более чем на столько-то минут. Предотвращает постоянное застревание элементов."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Очередь обработки"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Удаляет незавершенные заказы (статус: New), возраст которых превышает указанное количество дней. Все связанные с заказом данные (товары, атрибуты, доставка, налог и т.д.) удаляются каскадом."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Сухой запуск"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Если задача включена, она сообщает, какие заказы будут удалены, не удаляя их на самом деле. Отключите, чтобы выполнить реальное удаление."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Старее, чем (дней)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Удаляет брошенные заказы старше этого количества дней. Установите значение 0, чтобы удалить все заказы со статусом New, независимо от возраста."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Удалить заброшенные заказы"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Получает последние курсы обмена валют от настроенного поставщика API и обновляет все включенные валюты. Настройте провайдера API в плагине приложения J2Commerce Currency Updater."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Обновление курсов валют"
