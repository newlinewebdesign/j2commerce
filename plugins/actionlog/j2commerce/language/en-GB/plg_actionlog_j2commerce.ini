PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_GROUPS_DESC="User groups that receive email notifications for high-priority events."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART="Log Basket Events"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART_DESC="Enable logging of add to basket, remove, update quantity, and clear basket events."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT="Log Checkout Events"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT_DESC="Enable logging of checkout funnel events (start, login, billing, shipping, payment)."
