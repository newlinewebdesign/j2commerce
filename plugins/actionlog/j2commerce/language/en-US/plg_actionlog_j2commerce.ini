; Plugin identity
PLG_ACTIONLOG_J2COMMERCE="J2Commerce - Action Log"
PLG_ACTIONLOG_J2COMMERCE_DESCRIPTION="Logs J2Commerce shop activity (cart, checkout, orders) to Joomla's action log."

; Parameters
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_LEVEL="Email Notification Level"
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_LEVEL_DESC="Minimum event priority that triggers email notifications."
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_GROUPS="Notification User Groups"
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_GROUPS_DESC="User groups that receive email notifications for high-priority events."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART="Log Cart Events"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART_DESC="Enable logging of add to cart, remove, update quantity, and clear cart events."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT="Log Checkout Events"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT_DESC="Enable logging of checkout funnel events (start, login, billing, shipping, payment)."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_ORDERS="Log Order Events"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_ORDERS_DESC="Enable logging of order completion and status change events."

; Priority levels
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_BROWSE="Browse"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_ACTION="Action"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_SUCCESS="Success"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_WARNING="Warning"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_CRITICAL="Critical"

; Guest user
PLG_ACTIONLOG_J2COMMERCE_GUEST="Guest"

; Cart events
PLG_ACTIONLOG_J2COMMERCE_CART_ADD="User <a href='{accountlink}'>{username}</a> added {quantity} {product_name} to the cart"
PLG_ACTIONLOG_J2COMMERCE_CART_REMOVE="User <a href='{accountlink}'>{username}</a> removed &quot;{product_name}&quot; from the cart"
PLG_ACTIONLOG_J2COMMERCE_CART_UPDATE_QTY="User <a href='{accountlink}'>{username}</a> updated &quot;{product_name}&quot; quantity from {old_qty} to {new_qty}"
PLG_ACTIONLOG_J2COMMERCE_CART_CLEAR="User <a href='{accountlink}'>{username}</a> cleared the shopping cart"

; Checkout funnel events
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_START="User <a href='{accountlink}'>{username}</a> started checkout"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_LOGIN="User <a href='{accountlink}'>{username}</a> logged in during checkout"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_BILLING="User <a href='{accountlink}'>{username}</a> completed Checkout: Billing Address"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_SHIPPING="User <a href='{accountlink}'>{username}</a> completed Checkout: Shipping Address"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_PAYMENT="User <a href='{accountlink}'>{username}</a> reached Checkout: Payment &amp; Shipping"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_CONFIRM="User <a href='{accountlink}'>{username}</a> reached Checkout: Order Review"

; Order events
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_SUCCESS="User <a href='{accountlink}'>{username}</a> completed order #{order_id} (status: {status_name})"
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_FAILED="User <a href='{accountlink}'>{username}</a> order #{order_id} payment failed (status: {status_name})"
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_NEW="User <a href='{accountlink}'>{username}</a> order #{order_id} created with status: {status_name}"
PLG_ACTIONLOG_J2COMMERCE_ORDER_STATUS_CHANGE="User <a href='{accountlink}'>{username}</a> changed order #{order_id} status from {old_status_name} to {new_status_name}"

; Email notifications
PLG_ACTIONLOG_J2COMMERCE_EMAIL_SUBJECT="[%s] J2Commerce Shop Alert"
PLG_ACTIONLOG_J2COMMERCE_EMAIL_BODY="The following event occurred on your shop (%2$s):\n\n%1$s"