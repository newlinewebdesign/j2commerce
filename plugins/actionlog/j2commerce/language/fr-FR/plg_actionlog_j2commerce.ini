; Plugin identity
PLG_ACTIONLOG_J2COMMERCE="J2Commerce - Journal des actions"
PLG_ACTIONLOG_J2COMMERCE_DESCRIPTION="Enregistre l'activité de la boutique J2Commerce (panier, paiement, commandes) dans le journal des actions de Joomla."

; Parameters
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_LEVEL="Niveau de notification par e-mail"
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_LEVEL_DESC="Priorité minimale de l'événement qui déclenche les notifications par e-mail."
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_GROUPS="Notifications aux groupes d'utilisateurs"
PLG_ACTIONLOG_J2COMMERCE_PARAM_NOTIFICATION_GROUPS_DESC="Les groupes d'utilisateurs qui reçoivent des notifications par e-mail pour les événements hautement prioritaires."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART="Journaliser les événements du panier"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CART_DESC="Activez la journalisation des événements suivants : ajout au panier, suppression, modification de la quantité et vidage du panier."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT="Journaliser les événements de paiement"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_CHECKOUT_DESC="Activer la journalisation des événements du tunnel de paiement (début, connexion, facturation, expédition, paiement)."
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_ORDERS="Journaliser les événements de commandes"
PLG_ACTIONLOG_J2COMMERCE_PARAM_LOG_ORDERS_DESC="Activez la journalisation des événements liés à la finalisation des commandes et aux changements de statut."

; Priority levels
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_BROWSE="Parcourir"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_ACTION="Action"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_SUCCESS="Succès"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_WARNING="Avertissement"
PLG_ACTIONLOG_J2COMMERCE_PRIORITY_CRITICAL="Crucial"

; Guest user
PLG_ACTIONLOG_J2COMMERCE_GUEST="Invité"

; Cart events
PLG_ACTIONLOG_J2COMMERCE_CART_ADD="L'utilisateur <a href='{accountlink}'>{username}</a> a ajouté {quantity} {product_name} au panier"
PLG_ACTIONLOG_J2COMMERCE_CART_REMOVE="L'utilisateur <a href='{accountlink}'>{username}</a> a retiré &quot;{product_name}&quot; du panier"
PLG_ACTIONLOG_J2COMMERCE_CART_UPDATE_QTY="L'utilisateur <a href='{accountlink}'>{username}</a> a mis à jour la quantité de &quot;{product_name}&quot; de {old_qty} à {new_qty}"
PLG_ACTIONLOG_J2COMMERCE_CART_CLEAR="L'utilisateur <a href='{accountlink}'>{username}</a> a vidé son panier"

; Checkout funnel events
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_START="L'utilisateur <a href='{accountlink}'>{username}</a> a lancé le processus de paiement"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_LOGIN="L'utilisateur <a href='{accountlink}'>{username}</a> s'est connecté lors du paiement"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_BILLING="L'utilisateur <a href='{accountlink}'>{username}</a> a terminé son panier : Adresse de facturation"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_SHIPPING="L'utilisateur <a href='{accountlink}'>{username}</a> a terminé son panier : adresse de livraison"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_PAYMENT="L'utilisateur <a href='{accountlink}'>{username}</a> est arrivé à la page de paiement : Paiement et livraison"
PLG_ACTIONLOG_J2COMMERCE_CHECKOUT_CONFIRM="L'utilisateur <a href='{accountlink}'>{username}</a> est arrivé à la page de paiement : Vérification de la commande"

; Order events
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_SUCCESS="L'utilisateur <a href='{accountlink}'>{username}</a> a finalisé la commande #{order_id} (statut : {status_name})"
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_FAILED="Le paiement de la commande #{order_id} de l'utilisateur <a href='{accountlink}'>{username}</a> a échoué (statut : {status_name})"
PLG_ACTIONLOG_J2COMMERCE_ORDER_PAYMENT_NEW="L'utilisateur <a href='{accountlink}'>{username}</a> a créé la commande #{order_id} avec le statut : {status_name}"
PLG_ACTIONLOG_J2COMMERCE_ORDER_STATUS_CHANGE="L'utilisateur <a href='{accountlink}'>{username}</a> a modifié le statut de la commande #{order_id} de {old_status_name} à {new_status_name}"

; Email notifications
PLG_ACTIONLOG_J2COMMERCE_EMAIL_SUBJECT="[%s] Alerte boutique J2Commerce"
PLG_ACTIONLOG_J2COMMERCE_EMAIL_BODY="L'événement suivant s'est produit dans votre boutique (%2$s) :\n\n%1$s"