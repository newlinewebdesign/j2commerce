PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="Контактный адрес Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Адрес электронной почты, отправляемый в API геокодирования Nominatim в соответствии с их политикой использования. Если оставить его пустым, он вернется к электронной почте администратора J2Commerce."
