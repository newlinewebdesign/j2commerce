PLG_SYSTEM_J2COMMERCE="Система - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Системный плагин, обеспечивающий основную функциональность J2Commerce, включая управление сеансами корзины, инициализацию JavaScript, внедрение классов версий и фоновые задачи cron по контролю инвентаризации."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Основные параметры"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Карта Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Схема"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Настройки"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Включить класс версий"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Добавьте класс версии J2Commerce в тег body на фронтенд-страницах J2Commerce. Это позволит нацеливать CSS на конкретную версию."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Очищать кэш при обновлении корзины"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Автоматически очищайте кэш страницы при изменении корзины. Благодаря этому пользователи всегда видят актуальные данные корзины."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Включить инвентаризацию Cron"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Запустите ежедневное задание по контролю запасов, чтобы отменить неоплаченные заказы, просроченные по срокам, и восстановить запасы. Задание запускается автоматически при загрузке страницы, если с момента последнего запуска прошло 24 часа."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Выполнено задание инвентарного контроля cron."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Корзина перемещена для вошедшего пользователя."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Кэш страницы очищен после обновления корзины."

