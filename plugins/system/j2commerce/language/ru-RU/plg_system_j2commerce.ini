PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Разрешите добавлять HTML-комментарии, показывающие отладочную информацию об инъекциях схемы."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Бренд по умолчанию"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Название бренда по умолчанию, используемое, когда у продуктов нет производителя."

