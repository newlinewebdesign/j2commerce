PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Уровень масштабирования по умолчанию"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Уровень масштабирования для карты. 1 = мир, 19 = уровень зданий. По умолчанию: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Поставщик плиток"
