PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Προσαρμοσμένη ημερομηνία"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Προσαρμοσμένη ημερομηνία ισχύος μέχρι"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Επιλέξτε μια προσαρμοσμένη ημερομηνία για την εγκυρότητα της τιμής. Χρησιμοποιείται μόνο όταν έχει επιλεγεί η 'Προσαρμοσμένη ημερομηνία' παραπάνω."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Εμφάνιση χάρτη στην επιβεβαίωση παραγγελίας"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Ύψος χάρτη (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Ύψος σε εικονοστοιχεία για το δοχείο χάρτη. Προεπιλογή: 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Προεπιλεγμένο επίπεδο ζουμ"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Επίπεδο ζουμ για το χάρτη. 1 = παγκόσμιο επίπεδο, 19 = επίπεδο κτιρίου. Προεπιλογή: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Πάροχος πλακιδίων"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Επιλέξτε τον πάροχο πλακιδίων χάρτη."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="Email επικοινωνίας Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Διεύθυνση ηλεκτρονικού ταχυδρομείου που αποστέλλεται στο API γεωκωδικοποίησης της Nominatim σύμφωνα με την πολιτική χρήσης τους. Επιστρέφει στο email του διαχειριστή του J2Commerce, αν παραμείνει κενό."
