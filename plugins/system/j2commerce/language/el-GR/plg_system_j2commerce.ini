PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Κατεστραμμένο"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Τιμή ισχύει μέχρι"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Πόσο καιρό θα πρέπει να ισχύει η τιμή. Απαιτείται για τη συμμόρφωση του Google Merchant."
