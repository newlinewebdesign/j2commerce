PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Κατάσταση προϊόντος"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Προεπιλεγμένη συνθήκη για όλα τα προϊόντα. Αυτή η τιμή χρησιμοποιείται για τη συμμόρφωση με τα πλούσια αποτελέσματα της Google."
