PLG_SYSTEM_J2COMMERCE="Σύστημα - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Πρόσθετο σύστημα που παρέχει βασική λειτουργικότητα J2Commerce, συμπεριλαμβανομένης της διαχείρισης συνόδου καλαθιού, της αρχικοποίησης JavaScript, της έγχυσης κλάσεων έκδοσης και των εργασιών cron για τον έλεγχο αποθεμάτων στο παρασκήνιο."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Βασικές επιλογές"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Χάρτης Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Σχήμα"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Ρυθμίσεις"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Ενεργοποίηση κλάσης έκδοσης"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Προσθέστε την κλάση έκδοσης J2Commerce στην ετικέτα σώματος στις frontend σελίδες J2Commerce. Αυτό επιτρέπει τη στόχευση CSS για συγκεκριμένες εκδόσεις."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Εκκαθάριση προσωρινής μνήμης κατά την ενημέρωση του καλαθιού"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Αυτόματη εκκαθάριση της προσωρινής μνήμης cache της σελίδας όταν τροποποιείται το καλάθι αγορών. Αυτό διασφαλίζει ότι οι χρήστες βλέπουν πάντα τα τρέχοντα δεδομένα του καλαθιού."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Ενεργοποίηση Cron απογραφής"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Εκτελέστε μια καθημερινή εργασία ελέγχου αποθεμάτων για την ακύρωση απλήρωτων παραγγελιών που έχουν λήξει την προθεσμία τους και την αποκατάσταση του αποθέματος. Αυτό εκτελείται αυτόματα κατά τη φόρτωση της σελίδας όταν έχουν περάσει 24 ώρες από την τελευταία εκτέλεση."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Εκτέλεση της εργασίας cron ελέγχου απογραφής."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Το καλάθι μεταφέρθηκε για τον συνδεδεμένο χρήστη."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Εκκαθάριση της προσωρινής μνήμης της σελίδας μετά την ενημέρωση του καλαθιού."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Λειτουργία εντοπισμού σφαλμάτων"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Ενεργοποιήστε την προσθήκη σχολίων HTML που εμφανίζουν πληροφορίες εντοπισμού σφαλμάτων έγχυσης σχήματος."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Προεπιλεγμένη μάρκα"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Προεπιλεγμένη επωνυμία που χρησιμοποιείται όταν τα προϊόντα δεν έχουν εκχωρήσει έναν κατασκευαστή."

