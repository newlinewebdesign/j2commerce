PLG_SYSTEM_J2COMMERCE="Systeem - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Systeem-plugin die de kernfunctionaliteit van J2Commerce biedt, inclusief winkelwagen-sessiebeheer, JavaScript-initialisatie, injectie van versie-klassen en cron-taken voor inventariscontrole op de achtergrond."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Basis Opties"
