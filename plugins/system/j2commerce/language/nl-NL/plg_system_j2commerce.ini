; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Versie klasse inschakelen"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Voeg J2Commerce versie klasse toe aan de body tag op frontend J2Commerce pagina's. Dit maakt versie-specifieke CSS targeting mogelijk."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Cache wissen bij winkelwagenupdate"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Wis de cache van de pagina automatisch wanneer de winkelwagen wordt gewijzigd. Dit zorgt ervoor dat gebruikers altijd de huidige winkelwagengegevens zien."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Inventaris Cron inschakelen"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Voer dagelijks een voorraadcontroletaak uit om onbetaalde bestellingen na de deadline te annuleren en de voorraad te herstellen. Deze taak wordt automatisch uitgevoerd bij het laden van de pagina als er 24 uur zijn verstreken sinds de laatste taak is uitgevoerd."

