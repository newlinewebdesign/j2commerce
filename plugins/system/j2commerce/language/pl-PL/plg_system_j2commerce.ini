PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Wyczyść pamięć podręczną przy aktualizacji koszyka"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Automatycznie czyści pamięć podręczną strony, gdy koszyk zostanie zmodyfikowany. Dzięki temu użytkownicy zawsze widzą aktualne dane koszyka."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Włącz Cron inwentaryzacji"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Uruchamia codzienne zadanie kontroli zapasów, aby anulować nieopłacone zamówienia po terminie i przywrócić zapasy. Uruchamia się automatycznie przy ładowaniu strony, gdy miną 24 godziny od ostatniego uruchomienia."

