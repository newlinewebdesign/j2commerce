PLG_SYSTEM_J2COMMERCE="Sistema - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Plugin de sistema que proporciona la funcionalidad principal de J2Commerce, incluyendo la gestión de la sesión del carrito, la inicialización de JavaScript, la inyección de clases de versión y las tareas cron de control de inventario en segundo plano."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Opciones básicas"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Mapa Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Esquema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Configuración"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Activar clase de versión"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Añade la clase de versión J2Commerce a la etiqueta body en las páginas frontend J2Commerce. Esto permite la orientación CSS específica de la versión."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Borrar caché al actualizar el carrito"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Borre automáticamente la caché de la página cuando se modifique el carrito de la compra. Esto asegura que los usuarios siempre vean los datos actuales del carrito."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Activar Cron de inventario"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Ejecute una tarea diaria de control de inventario para cancelar los pedidos impagados fuera de plazo y restaurar el inventario. Esto se ejecuta automáticamente al cargar la página cuando han pasado 24 horas desde la última ejecución."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Tarea cron de control de inventario ejecutada."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Carrito migrado para usuario registrado."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Caché de la página borrada tras la actualización del carrito."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Modo depuración"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Habilitar para añadir comentarios HTML mostrando información de depuración de inyección de esquema."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Marca por defecto"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Marca por defecto a utilizar cuando los productos no tienen un fabricante asignado."

; Offers Fieldset
PLG_SYSTEM_J2COMMERCE_FIELDSET_OFFERS_LABEL="Configuración de la oferta"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Condición del artículo"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Condición por defecto para todos los productos. Este valor se utiliza para el cumplimiento de Google Rich Results."
PLG_SYSTEM_J2COMMERCE_OPTION_NEW_CONDITION="Nuevo"
PLG_SYSTEM_J2COMMERCE_OPTION_USED_CONDITION="Usado"
PLG_SYSTEM_J2COMMERCE_OPTION_REFURBISHED_CONDITION="Reacondicionado"
PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Dañado"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Precio válido hasta"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Cuánto tiempo debe ser válido el precio. Requerido para el cumplimiento de Google Merchant."
PLG_SYSTEM_J2COMMERCE_OPTION_1_MONTH="1 mes"
PLG_SYSTEM_J2COMMERCE_OPTION_3_MONTHS="3 Meses"
PLG_SYSTEM_J2COMMERCE_OPTION_6_MONTHS="6 Meses"
PLG_SYSTEM_J2COMMERCE_OPTION_1_YEAR="1 Año (Recomendado)"
PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Fecha personalizada"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Fecha de validez personalizada"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Seleccione una fecha personalizada para la validez del precio. Sólo se utiliza cuando se selecciona 'Fecha personalizada' más arriba."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Mostrar mapa en la confirmación del pedido"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Altura del mapa (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Altura en píxeles para el contenedor del mapa. Por defecto: 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Nivel de zoom por defecto"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Nivel de zoom para el mapa. 1 = mundo, 19 = nivel de edificio. Por defecto: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Proveedor de mosaicos"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Seleccione el proveedor de mosaicos del mapa."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="Correo electrónico de contacto de Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Dirección de correo electrónico enviada a la API de geocodificación de Nominatim según su política de uso. Vuelve al correo electrónico del administrador de J2Commerce si se deja vacío."
