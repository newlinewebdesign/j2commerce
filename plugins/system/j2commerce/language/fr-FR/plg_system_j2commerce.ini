PLG_SYSTEM_J2COMMERCE="Système - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Plugin système qui fournit les fonctionnalités de base de J2Commerce, y compris la gestion de la session du panier, l'initialisation JavaScript, l'injection de classe de version et les tâches cron de contrôle de l'inventaire en arrière-plan."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Options de base"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Carte Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Schéma"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Paramètres"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Activer la classe de version"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Ajoutez la classe de version J2Commerce à la balise body sur les pages frontend J2Commerce. Cela permet un ciblage CSS spécifique à la version."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Effacer le cache lors de la mise à jour du panier"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Effacez automatiquement le cache de la page lorsque le panier est modifié. Cela permet de s'assurer que les utilisateurs voient toujours les données actuelles du panier."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Activer le Cron d'inventaire"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Exécutez une tâche quotidienne de contrôle de l'inventaire pour annuler les commandes impayées au-delà de la date limite et rétablir l'inventaire. Cette tâche s'exécute automatiquement au chargement de la page lorsque 24 heures se sont écoulées depuis la dernière exécution."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Tâche cron de contrôle d'inventaire exécutée."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Panier migré pour l'utilisateur connecté."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Le cache de la page a été vidé après la mise à jour du panier."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Mode débogage"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Permet d'ajouter des commentaires HTML affichant des informations de débogage sur l'injection de schéma."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Marque par défaut"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Marque par défaut à utiliser lorsque les produits n'ont pas de fabricant assigné."

; Offers Fieldset
PLG_SYSTEM_J2COMMERCE_FIELDSET_OFFERS_LABEL="Paramètres de l'offre"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Condition de l'article"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Condition par défaut pour tous les produits. Cette valeur est utilisée pour la conformité avec les résultats enrichis de Google."
PLG_SYSTEM_J2COMMERCE_OPTION_NEW_CONDITION="Nouveau"
PLG_SYSTEM_J2COMMERCE_OPTION_USED_CONDITION="Utilisé"
PLG_SYSTEM_J2COMMERCE_OPTION_REFURBISHED_CONDITION="Remis à neuf"
PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Endommagé"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Prix valable jusqu'à"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Durée de validité du prix. Nécessaire pour la conformité avec Google Merchant."
PLG_SYSTEM_J2COMMERCE_OPTION_1_MONTH="1 mois"
PLG_SYSTEM_J2COMMERCE_OPTION_3_MONTHS="3 mois"
PLG_SYSTEM_J2COMMERCE_OPTION_6_MONTHS="6 mois"
PLG_SYSTEM_J2COMMERCE_OPTION_1_YEAR="1 an (recommandé)"
PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Date personnalisée"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Date de validité personnalisée"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Sélectionnez une date personnalisée pour la validité du prix. Cette option n'est utilisée que si vous avez sélectionné 'Date personnalisée' ci-dessus."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Afficher la carte sur la confirmation de commande"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Hauteur de la carte (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Hauteur en pixels du conteneur de la carte. Valeur par défaut : 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Niveau de zoom par défaut"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Niveau de zoom pour la carte. 1 = monde, 19 = niveau du bâtiment. Valeur par défaut : 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Fournisseur de tuiles"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Sélectionnez le fournisseur de tuiles de la carte."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="Email de contact Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Adresse email envoyée à l'API de géocodage de Nominatim conformément à leur politique d'utilisation. Renvoie à l'adresse email de l'administrateur de J2Commerce si elle est vide."
