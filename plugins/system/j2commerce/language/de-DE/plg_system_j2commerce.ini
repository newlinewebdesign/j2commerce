PLG_SYSTEM_J2COMMERCE="System - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="System-Plugin, das die Kernfunktionen von J2Commerce bereitstellt, einschließlich der Verwaltung von Warenkorbsitzungen, JavaScript-Initialisierung, Injektion von Versionsklassen und Cron-Aufgaben zur Inventarisierung im Hintergrund."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Grundlegende Optionen"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Leaflet Karte"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Schema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Einstellungen"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Versionsklasse einschalten"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Fügen Sie die J2Commerce-Versionsklasse zum Body-Tag auf J2Commerce-Frontend-Seiten hinzu. Dies ermöglicht eine versionsspezifische CSS-Ausrichtung."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Cache bei Warenkorbaktualisierung löschen"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Löschen Sie automatisch den Seiten-Cache, wenn der Einkaufswagen geändert wird. Dadurch wird sichergestellt, dass die Benutzer immer die aktuellen Warenkorbdaten sehen."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Inventar-Cron aktivieren"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Führen Sie täglich eine Aufgabe zur Bestandskontrolle aus, um unbezahlte Bestellungen nach Ablauf der Frist zu stornieren und den Bestand wiederherzustellen. Diese Aufgabe wird automatisch beim Laden der Seite ausgeführt, wenn seit der letzten Ausführung 24 Stunden vergangen sind."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Cron-Aufgabe zur Bestandskontrolle ausgeführt."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Warenkorb für eingeloggten Benutzer migriert."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Seitencache nach Aktualisierung des Warenkorbs geleert."

