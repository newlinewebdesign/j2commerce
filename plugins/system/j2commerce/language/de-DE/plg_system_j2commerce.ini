PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="E-Mail-Adresse, die an die Nominatim Geokodierungs-API gemäß deren Nutzungsrichtlinien gesendet wird. Fällt auf die J2Commerce Admin-E-Mail zurück, wenn sie leer bleibt."
