PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="在庫管理クーロンタスクが実行されました。"
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="ログインユーザーのカートが移行されました。"
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="カート更新後、ページキャッシュがクリアされました。"

