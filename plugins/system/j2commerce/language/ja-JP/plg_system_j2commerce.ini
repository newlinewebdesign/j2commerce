PLG_SYSTEM_J2COMMERCE="システム - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="カートセッション管理、JavaScript初期化、バージョンクラス注入、バックグラウンド在庫管理クーロンタスクなど、J2Commerceのコア機能を提供するシステムプラグインです。"

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="基本オプション"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Leafletマップ"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="スキーマ"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="設定"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="バージョンクラスを有効にする"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="フロントエンドのJ2CommerceページのbodyタグにJ2Commerceバージョンクラスを追加します。これにより、バージョン固有のCSSターゲティングが可能になります。"

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="カート更新時にキャッシュをクリア"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="ショッピングカートが変更されたときに自動的にページのキャッシュをクリアします。これにより、ユーザーは常に現在のカートデータを見ることができます。"

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="在庫クーロンを有効にする"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="期限を過ぎた未払い注文をキャンセルし、在庫を元に戻すために毎日在庫管理タスクを実行します。このタスクは前回の実行から24時間が経過すると、ページロード時に自動的に実行されます。"

