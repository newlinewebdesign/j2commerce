PLG_SYSTEM_J2COMMERCE="Sistema - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Plugin de sistema que fornece a funcionalidade central do J2Commerce, incluindo gerenciamento de sessão de carrinho, inicialização de JavaScript, injeção de classe de versão e tarefas cron de controle de inventário em segundo plano."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Opções básicas"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Mapa Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Esquema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Configurações"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Ativar classe de versão"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Adicione a classe de versão do J2Commerce à tag body nas páginas front-end do J2Commerce. Isso permite o direcionamento de CSS específico da versão."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Limpar cache na atualização do carrinho"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Limpe automaticamente o cache da página quando o carrinho de compras for modificado. Isto assegura que os utilizadores vêem sempre os dados actuais do carrinho."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Ativar o Inventário Cron"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Execute uma tarefa diária de controlo de inventário para cancelar encomendas não pagas após o prazo e restaurar o inventário. Isto é executado automaticamente no carregamento da página quando tiverem passado 24 horas desde a última execução."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Tarefa cron de controlo de inventário executada."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Carrinho migrado para o utilizador com sessão iniciada."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Cache da página limpa após a atualização do carrinho."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Modo de depuração"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Permita adicionar comentários HTML mostrando informações de depuração de injeção de esquema."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Marca padrão"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Nome da marca predefinida a utilizar quando os produtos não têm um fabricante atribuído."

; Offers Fieldset
PLG_SYSTEM_J2COMMERCE_FIELDSET_OFFERS_LABEL="Definições da oferta"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Condição do item"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Condição predefinida para todos os produtos. Este valor é utilizado para a conformidade com o Google Rich Results."
PLG_SYSTEM_J2COMMERCE_OPTION_NEW_CONDITION="Novo"
PLG_SYSTEM_J2COMMERCE_OPTION_USED_CONDITION="Usado"
PLG_SYSTEM_J2COMMERCE_OPTION_REFURBISHED_CONDITION="Recondicionado"
PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Danificado"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Preço válido até"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Por quanto tempo o preço deve ser válido. Necessário para conformidade com o Google Merchant."
PLG_SYSTEM_J2COMMERCE_OPTION_1_MONTH="1 mês"
PLG_SYSTEM_J2COMMERCE_OPTION_3_MONTHS="3 meses"
PLG_SYSTEM_J2COMMERCE_OPTION_6_MONTHS="6 Meses"
PLG_SYSTEM_J2COMMERCE_OPTION_1_YEAR="1 ano (recomendado)"
PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Data personalizada"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Data personalizada de validade até"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Selecione uma data personalizada para a validade do preço. Apenas utilizado quando a 'Data personalizada' é selecionada acima."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Mostrar mapa na confirmação da encomenda"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Altura do mapa (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Altura em pixéis para o contentor do mapa. Predefinição: 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Nível de zoom padrão"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Nível de zoom para o mapa. 1 = mundo, 19 = nível do edifício. Padrão: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Provedor de Tile"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Selecione o fornecedor de mosaicos do mapa."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="E-mail de contacto Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Endereço de e-mail enviado para a API de geocodificação Nominatim de acordo com a sua política de utilização. Se deixar em branco, volta para o e-mail do administrador do J2Commerce."
