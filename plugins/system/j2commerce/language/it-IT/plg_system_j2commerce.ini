PLG_SYSTEM_J2COMMERCE="Sistema - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Plugin di sistema che fornisce le funzionalità fondamentali di J2Commerce, tra cui la gestione della sessione del carrello, l'inizializzazione di JavaScript, l'iniezione di classi di versione e le attività cron di controllo dell'inventario in background."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Opzioni di base"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Mappa Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Schema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Impostazioni"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Abilita classe di versione"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Aggiunge la classe di versione J2Commerce al tag body delle pagine J2Commerce del frontend. Ciò consente di indirizzare il CSS in base alla versione."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Cancella la cache all'aggiornamento del carrello"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Cancella automaticamente la cache della pagina quando il carrello viene modificato. Questo assicura che gli utenti vedano sempre i dati attuali del carrello."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Abilita Cron Inventario"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Esegue un'attività giornaliera di controllo dell'inventario per cancellare gli ordini non pagati oltre la loro scadenza e ripristinare l'inventario. Viene eseguita automaticamente al caricamento della pagina quando sono trascorse 24 ore dall'ultima esecuzione."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Attività cron di controllo dell'inventario eseguita."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Carrello migrato per l'utente collegato."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Cache della pagina cancellata dopo l'aggiornamento del carrello."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Modalità Debug"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Abilita l'aggiunta di commenti HTML che mostrano informazioni di debug sull'iniezione dello schema."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Marchio predefinito"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Marchio predefinito da utilizzare quando i prodotti non hanno un produttore assegnato."

; Offers Fieldset
PLG_SYSTEM_J2COMMERCE_FIELDSET_OFFERS_LABEL="Impostazioni dell'offerta"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Condizione dell'articolo"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Condizione predefinita per tutti i prodotti. Questo valore viene utilizzato per la conformità a Google Rich Results."
PLG_SYSTEM_J2COMMERCE_OPTION_NEW_CONDITION="Nuovo"
PLG_SYSTEM_J2COMMERCE_OPTION_USED_CONDITION="Usato"
PLG_SYSTEM_J2COMMERCE_OPTION_REFURBISHED_CONDITION="Rinnovato"
PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Danneggiato"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Prezzo valido fino a"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Per quanto tempo il prezzo deve essere valido. Richiesto per la conformità a Google Merchant."
PLG_SYSTEM_J2COMMERCE_OPTION_1_MONTH="1 mese"
PLG_SYSTEM_J2COMMERCE_OPTION_3_MONTHS="3 Mesi"
PLG_SYSTEM_J2COMMERCE_OPTION_6_MONTHS="6 mesi"
PLG_SYSTEM_J2COMMERCE_OPTION_1_YEAR="1 anno (consigliato)"
PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Data personalizzata"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Data personalizzata valida fino alla data"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Selezioni una data personalizzata per la validità del prezzo. Viene utilizzata solo quando si seleziona 'Data personalizzata' in precedenza."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Mostra mappa su conferma ordine"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Altezza mappa (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Altezza in pixel per il contenitore della mappa. Predefinito: 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Livello di zoom predefinito"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Livello di zoom per la mappa. 1 = mondo, 19 = livello edificio. Predefinito: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Fornitore di tile"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Seleziona il fornitore di tile della mappa."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="Email di contatto Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Indirizzo e-mail inviato all'API di geocodifica di Nominatim secondo la loro politica di utilizzo. Se lasciato vuoto, ritorna all'e-mail dell'amministratore di J2Commerce."
