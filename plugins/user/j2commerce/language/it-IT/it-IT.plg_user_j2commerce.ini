PLG_USER_J2COMMERCE="J2Commerce - Indirizzo per la registrazione dell'utente"
PLG_USER_J2COMMERCE_DESC="Aggiunge i campi relativi agli indirizzi di J2Commerce ai moduli di registrazione degli utenti e di modifica del profilo in Joomla. Salva gli indirizzi nella tabella degli indirizzi di J2Commerce al momento del salvataggio dell'utente."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Mostra i campi dell'indirizzo"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Visualizzare i campi relativi all'indirizzo di J2Commerce nei moduli di registrazione degli utenti e di modifica degli utenti amministratori."
PLG_USER_J2COMMERCE_FIELDS_HTML="Personalizzare la struttura dei campi"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Layout HTML personalizzato per i campi dell'indirizzo. Utilizzi segnaposto come [first_name], [last_name], [address_1], ecc. Se non inserisce nulla, verrà utilizzato il layout predefinito a due colonne."
PLG_USER_J2COMMERCE_DISABLE_NAME="Disattivare i campi del nome"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Se attivata, questa opzione nasconde i campi relativi al nome e al cognome. Il nome verrà invece ricavato dal campo "Nome utente" di Joomla."
PLG_USER_J2COMMERCE_ADDRESS_FIELDS="Indirizzo"