PLG_USER_J2COMMERCE="J2Commerce - ユーザー登録用アドレス"
PLG_USER_J2COMMERCE_DESC="Joomlaのユーザー登録フォームおよびプロフィール編集フォームに、J2Commerceの住所入力欄を追加します。ユーザーが保存を行うと、住所情報がJ2Commerceの住所テーブルに保存されます。"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="住所フィールドを表示する"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="ユーザー登録フォームおよび管理者によるユーザー編集フォームに、J2Commerceの住所入力欄を表示します。"
PLG_USER_J2COMMERCE_FIELDS_HTML="フィールドのレイアウトをカスタマイズする"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="住所入力欄用のカスタムHTMLレイアウトです。[first_name]、[last_name]、[address_1]などのプレースホルダーを使用してください。デフォルトの2列レイアウトを使用する場合は、空欄のままにしてください。"
PLG_USER_J2COMMERCE_DISABLE_NAME="名前フィールドを無効にする"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="有効にすると、名前と姓の入力欄が非表示になります。代わりに、Joomlaのユーザー名入力欄から名前が自動的に取得されます。"
