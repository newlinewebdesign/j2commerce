PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Mise en page HTML personnalisée pour les champs d'adresse. Utilisez des variables telles que [first_name], [last_name], [address_1], etc. Laissez ces champs vides pour conserver la mise en page par défaut sur deux colonnes."
PLG_USER_J2COMMERCE_DISABLE_NAME="Désactiver les champs de nom"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Lorsque cette option est activée, les champs « Prénom » et « Nom » sont masqués. Le nom sera alors déduit à partir du champ « Nom d'utilisateur » de Joomla."
