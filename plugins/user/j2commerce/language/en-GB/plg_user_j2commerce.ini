PLG_USER_J2COMMERCE="J2Commerce - User Registration Address"
PLG_USER_J2COMMERCE_DESC="Adds J2Commerce address fields to the Joomla user registration and profile edit forms. Saves addresses to the J2Commerce address table on user save."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Show Address Fields"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Display J2Commerce address fields on the user registration and admin user edit forms."
PLG_USER_J2COMMERCE_FIELDS_HTML="Custom Field Layout"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Custom HTML layout for address fields. Use placeholders like [first_name], [last_name], [address_1], etc. Leave empty for the default two-column layout."
PLG_USER_J2COMMERCE_DISABLE_NAME="Disable Name Fields"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="When enabled, hides the first and last name fields. The name will be inferred from the Joomla user name field instead."
PLG_USER_J2COMMERCE_ADDRESS_FIELDS="Address"
