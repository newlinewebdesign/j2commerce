PLG_USER_J2COMMERCE="J2Commerce - Διεύθυνση εγγραφής χρήστη"
PLG_USER_J2COMMERCE_DESC="Προσθέτει πεδία διεύθυνσης J2Commerce στις φόρμες εγγραφής χρηστών και επεξεργασίας προφίλ του Joomla. Αποθηκεύει τις διευθύνσεις στον πίνακα διευθύνσεων του J2Commerce κατά την αποθήκευση του χρήστη."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Εμφάνιση πεδίων διεύθυνσης"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Εμφάνιση των πεδίων διεύθυνσης του J2Commerce στις φόρμες εγγραφής χρήστη και επεξεργασίας διαχειριστή."
PLG_USER_J2COMMERCE_FIELDS_HTML="Προσαρμογή διάταξης πεδίων"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Προσαρμοσμένη διάταξη HTML για τα πεδία διεύθυνσης. Χρησιμοποιήστε σύμβολα κράτησης θέσης όπως [first_name], [last_name], [address_1] κ.λπ. Αφήστε τα κενά για την προεπιλεγμένη διάταξη δύο στηλών."
PLG_USER_J2COMMERCE_DISABLE_NAME="Απενεργοποίηση πεδίων ονόματος"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Όταν είναι ενεργοποιημένη, κρύβει τα πεδία ονόματος και επωνύμου. Το όνομα θα αντληθεί από το πεδίο ονόματος χρήστη του Joomla."
