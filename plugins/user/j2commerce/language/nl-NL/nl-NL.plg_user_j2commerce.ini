PLG_USER_J2COMMERCE="J2Commerce - Registratieadres"
PLG_USER_J2COMMERCE_DESC="Voegt J2Commerce-adresvelden toe aan de formulieren voor gebruikersregistratie en het bewerken van profielen in Joomla. Slaat adressen op in de J2Commerce-adrestabel wanneer de gebruiker zijn gegevens opslaat."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Adresvelden weergeven"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Geef de adresvelden van J2Commerce weer op de formulieren voor gebruikersregistratie en het bewerken van beheerders."
PLG_USER_J2COMMERCE_FIELDS_HTML="Veldindeling aanpassen"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Aangepaste HTML-opmaak voor adresvelden. Gebruik plaatshouders zoals [first_name], [last_name], [address_1], enz. Laat deze velden leeg voor de standaardopmaak met twee kolommen."
PLG_USER_J2COMMERCE_DISABLE_NAME="Naamvelden uitschakelen"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Indien ingeschakeld, worden de velden voor voor- en achternaam verborgen. De naam wordt dan afgeleid uit het veld voor de Joomla-gebruikersnaam."
PLG_USER_J2COMMERCE_ADDRESS_FIELDS="Adres"