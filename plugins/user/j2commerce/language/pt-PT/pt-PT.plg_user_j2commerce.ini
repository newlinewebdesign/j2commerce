PLG_USER_J2COMMERCE="J2Commerce - Endereço de registo do utilizador"
PLG_USER_J2COMMERCE_DESC="Adiciona campos de endereço do J2Commerce aos formulários de registo de utilizadores e de edição de perfil do Joomla. Guarda os endereços na tabela de endereços do J2Commerce quando o utilizador guarda os dados."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Mostrar campos de endereço"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Mostrar os campos de endereço do J2Commerce nos formulários de registo de utilizadores e de edição de utilizadores administradores."
PLG_USER_J2COMMERCE_FIELDS_HTML="Personalizar o layout dos campos"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Layout HTML personalizado para os campos de endereço. Utilize marcadores de posição como [first_name], [last_name], [address_1], etc. Deixe em branco para utilizar o layout padrão de duas colunas."
PLG_USER_J2COMMERCE_DISABLE_NAME="Desativar campos de nome"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Quando ativada, esta opção oculta os campos do nome e do apelido. O nome será, então, deduzido a partir do campo do nome de utilizador do Joomla."
PLG_USER_J2COMMERCE_ADDRESS_FIELDS="Endereço"