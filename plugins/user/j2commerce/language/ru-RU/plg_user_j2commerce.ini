PLG_USER_J2COMMERCE="J2Commerce — Адрес для регистрации пользователей"
PLG_USER_J2COMMERCE_DESC="Добавляет поля адреса J2Commerce в формы регистрации пользователей и редактирования профилей в Joomla. Сохраняет адреса в таблице адресов J2Commerce при сохранении данных пользователя."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Показать поля адреса"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Отобразить поля адреса J2Commerce в формах регистрации пользователей и редактирования администратора."
PLG_USER_J2COMMERCE_FIELDS_HTML="Настроить расположение полей"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Пользовательский HTML-макет для полей адреса. Используйте заполнители, такие как [first_name], [last_name], [address_1] и т. д. Оставьте поля пустыми, чтобы использовать стандартный двухколонный макет."
PLG_USER_J2COMMERCE_DISABLE_NAME="Отключить поля имени"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Если этот параметр включен, поля «Имя» и «Фамилия» будут скрыты. Вместо этого имя будет определено на основе поля «Имя пользователя» в Joomla."
