PLG_USER_J2COMMERCE="J2Commerce – Adresse für die Benutzerregistrierung"
PLG_USER_J2COMMERCE_DESC="Fügt den Formularen für die Benutzerregistrierung und die Profilbearbeitung in Joomla Adressfelder von J2Commerce hinzu. Speichert die Adressen beim Speichern des Benutzers in der J2Commerce-Adresstabelle."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Adressfelder anzeigen"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Zeigen Sie die Adressfelder von J2Commerce in den Formularen zur Benutzerregistrierung und zur Bearbeitung von Administratoren an."
PLG_USER_J2COMMERCE_FIELDS_HTML="Feldlayout anpassen"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Benutzerdefiniertes HTML-Layout für Adressfelder. Verwenden Sie Platzhalter wie [first_name], [last_name], [address_1] usw. Lassen Sie das Feld leer, um das standardmäßige zweispaltige Layout beizubehalten."
PLG_USER_J2COMMERCE_DISABLE_NAME="Namensfelder deaktivieren"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Wenn diese Option aktiviert ist, werden die Felder für den Vor- und Nachnamen ausgeblendet. Der Name wird stattdessen aus dem Feld „Benutzername" in Joomla abgeleitet."
PLG_USER_J2COMMERCE_ADDRESS_FIELDS="Adresse"