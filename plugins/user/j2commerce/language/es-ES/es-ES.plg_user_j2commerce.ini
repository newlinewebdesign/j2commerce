PLG_USER_J2COMMERCE="J2Commerce - Dirección de registro de usuario"
PLG_USER_J2COMMERCE_DESC="Añade campos de dirección de J2Commerce a los formularios de registro de usuarios y de edición de perfiles de Joomla. Guarda las direcciones en la tabla de direcciones de J2Commerce al guardar el usuario."
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS="Mostrar campos de dirección"
PLG_USER_J2COMMERCE_SHOW_ADDRESS_FIELDS_DESC="Mostrar los campos de dirección de J2Commerce en los formularios de registro de usuarios y de edición de usuarios de administración."
PLG_USER_J2COMMERCE_FIELDS_HTML="Personalizar la disposición de los campos"
PLG_USER_J2COMMERCE_FIELDS_HTML_DESC="Diseño HTML personalizado para los campos de dirección. Utilice marcadores de posición como [first_name], [last_name], [address_1], etc. Délo en blanco para mantener el diseño predeterminado de dos columnas."
PLG_USER_J2COMMERCE_DISABLE_NAME="Desactivar los campos de nombre"
PLG_USER_J2COMMERCE_DISABLE_NAME_DESC="Cuando está activada, oculta los campos de nombre y apellidos. En su lugar, el nombre se deducirá a partir del campo de nombre de usuario de Joomla."
