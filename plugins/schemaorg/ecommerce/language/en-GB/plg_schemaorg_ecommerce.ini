PLG_SCHEMAORG_ECOMMERCE_FIELDSET_SCHEMA_TYPES="Schema Types"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ENABLE_PRODUCT_LABEL="Enable Product Schema"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ENABLE_PRODUCT_DESC="Generate schema.org/Product structured data for product pages."
PLG_SCHEMAORG_ECOMMERCE_FIELD_ENABLE_PRODUCT_GROUP_LABEL="Enable ProductGroup for Variants"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ENABLE_PRODUCT_GROUP_DESC="Use ProductGroup schema type for products with multiple variants."
