PLG_SCHEMAORG_ECOMMERCE="Schema.org - Ecommerce"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="This plugin adds Ecommerce (Product) structured data support using schema.org markup. It integrates with J2Commerce to automatically generate rich snippets for products, pricing, and availability."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Existing Product Data"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Auto-detected product information from J2Commerce. This data will be used unless overridden."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Schema Overrides"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Override auto-detected values. Leave fields empty to use detected values."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Leave fields empty to use the auto-detected values from J2Commerce. Any values you enter here will override the detected data in the generated schema."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Select 'Ecommerce' as the schema type to generate Product structured data. If this article is linked to a J2Commerce product, product data will be automatically detected and merged with any overrides you specify below."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Enable Auto-Detection"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="Automatically detect J2Commerce product data and merge with schema output."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Store Currency"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="The currency code configured in J2Commerce (config_currency). This is read-only and reflects your J2Commerce store settings."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="J2Commerce is not installed or not configured. Please configure J2Commerce to set your store currency."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Default Brand"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Default brand name to use when no brand is detected from product data."
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_LABEL="Organization Name"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_DESC="Name of the selling organization. Used for the seller property in Offer schema."

