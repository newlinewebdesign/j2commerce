PLG_J2COMMERCE_SHIPPING_STANDARD_DESC="نرخ‌های ارسال قابل پیکربندی را با ۷ نوع محاسبه ارائه می‌دهد: نرخ ثابت به ازای هر سفارش، مبتنی بر تعداد، مبتنی بر قیمت، نرخ ثابت به ازای هر قلم، وزن به ازای هر قلم، وزن به ازای هر سفارش و درصد به ازای هر قلم."
