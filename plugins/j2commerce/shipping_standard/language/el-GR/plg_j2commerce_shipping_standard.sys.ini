PLG_J2COMMERCE_SHIPPING_STANDARD="Τυπική αποστολή"
PLG_J2COMMERCE_SHIPPING_STANDARD_DESC="Παρέχει διαμορφώσιμες τιμές αποστολής με 7 τύπους υπολογισμού: κατ' αποκολή ανά παραγγελία, βάσει ποσότητας, βάσει τιμής, κατ' αποκολή ανά είδος, βάρος ανά είδος, βάρος ανά παραγγελία και ποσοστό ανά είδος."