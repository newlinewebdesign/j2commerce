PLG_J2COMMERCE_APP_CURRENCYUPDATER_ERROR_NO_BASE_CURRENCY="Не настроена базовая валюта магазина. Проверьте конфигурацию J2Commerce."
PLG_J2COMMERCE_APP_CURRENCYUPDATER_ERROR_NO_CURRENCIES="Не найдено ни одной включённой валюты для обновления (помимо базовой)."
