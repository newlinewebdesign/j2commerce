PLG_J2COMMERCE_APP_CURRENCYUPDATER="Приложение для обновления курсов валют"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_DESC="Это приложение обновляет курсы валют из различных источников API. Настройте предпочитаемого поставщика API ниже, затем воспользуйтесь кнопкой «Обновить курсы» в окне «Валюты» или настройте задачу планировщика Joomla для автоматического обновления."
PLG_J2COMMERCE_APP_CURRENCYUPDATER_XML_DESCRIPTION="Автоматически обновляет курсы валют из различных источников API для J2Commerce."

PLG_J2COMMERCE_APP_CURRENCYUPDATER_ABOUT="О программе обновления курсов валют"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_SETTINGS="Настройки"

; Layout Settings
PLG_J2COMMERCE_APP_CURRENCYUPDATER_LAYOUT_STYLE="Стиль макета"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_LAYOUT_STYLE_DESC="Выберите CSS-фреймворк для шаблона конфигурации."

; API Type Selection
PLG_J2COMMERCE_APP_CURRENCYUPDATER_API_TYPE="Источник API"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_API_TYPE_DESC="Выберите API-провайдера курсов валют, который будет использоваться для получения данных о курсах."

; API Options
PLG_J2COMMERCE_APP_CURRENCYUPDATER_FRANKFURTER="Frankfurter - Курсы ЕЦБ (рекомендуется)"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_FRANKFURTER_DESC="Бесплатный API с открытым исходным кодом от Европейского центрального банка. Ключ API не требуется. Поддерживает ~30 основных валют. Надёжный и неограниченный."

PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_HOST="ExchangeRate.host (Бесплатно, не требуется API-ключ)"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_HOST_DESC="Бесплатный сервис с широким валютным охватом. Для получения последних курсов не требуется API-ключ. Хороший запасной вариант, если Frankfurter не покрывает Ваши валюты."

PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_API="ExchangeRate-API (требуется ключ API)"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_API_DESC="Бесплатный уровень позволяет выполнять 1 500 запросов в месяц. Требуется API-ключ от exchangerate-api.com."

PLG_J2COMMERCE_APP_CURRENCYUPDATER_CURRENCYAPI="CurrencyAPI (требуется ключ API)"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_CURRENCYAPI_DESC="Бесплатный уровень позволяет выполнять 300 запросов в месяц. Требуется API-ключ от currencyapi.com"

; API Keys
PLG_J2COMMERCE_APP_CURRENCYUPDATER_API_KEY="API-ключ"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_API_KEY="Ключ ExchangeRate-API"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_EXCHANGERATE_API_KEY_DESC="Введите Ваш ключ ExchangeRate-API. Получите один бесплатно на https://app.exchangerate-api.com/keys"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_CURRENCYAPI_KEY="Ключ CurrencyAPI"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_CURRENCYAPI_KEY_DESC="Введите Ваш ключ CurrencyAPI. Получите один бесплатно на https://app.currencyapi.com/api-keys"

; Open Exchange Rates
PLG_J2COMMERCE_APP_CURRENCYUPDATER_OPENEXCHANGERATES="Открытые обменные курсы (требуется ключ API)"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_OPENEXCHANGERATES_NOTE="Бесплатный уровень позволяет выполнять 1,000 запросов в месяц с базой только в USD. Поддерживается 170+ валют, включая криптовалюты. Требуется API-ключ от openexchangerates.org"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_OPENEXCHANGERATES_APP_ID="Открытые обменные курсы App ID"
PLG_J2COMMERCE_APP_CURRENCYUPDATER_OPENEXCHANGERATES_APP_ID_DESC="Введите свой идентификатор приложения Open Exchange Rates. Получите один бесплатно на https://openexchangerates.org/signup/free"
