PLG_J2COMMERCE_APP_DIAGNOSTICS_NOTE_DESCRIPTION="Αυτό το εργαλείο θα σας βοηθήσει να διαγνώσετε ορισμένα από τα συνηθέστερα προβλήματα. Όταν υποβάλλετε ένα αίτημα υποστήριξης, παρακαλούμε να παρέχετε τις πληροφορίες συστήματος που εμφανίζονται εδώ."

