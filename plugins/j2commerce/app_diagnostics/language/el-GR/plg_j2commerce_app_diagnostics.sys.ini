; Plugin Description
PLG_J2COMMERCE_APP_DIAGNOSTICS="Εφαρμογή διαγνωστικών J2Commerce"
PLG_J2COMMERCE_APP_DIAGNOSTICS_DESCRIPTION="Η εφαρμογή διαγνωστικών J2Commerce θα σας βοηθήσει να διαγνώσετε ορισμένα από τα συνηθέστερα προβλήματα. Όταν υποβάλλετε ένα αίτημα υποστήριξης, παρακαλούμε να παρέχετε τις πληροφορίες συστήματος που παρέχονται σε αυτή την εφαρμογή."