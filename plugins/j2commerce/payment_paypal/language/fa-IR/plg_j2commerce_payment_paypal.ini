; Configuration - Subscription mode toggle
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_LABEL="حالت ایجاد اشتراک"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_DESC="<strong>نحوه ایجاد اشتراک‌های جدید در هنگام تسویه‌حساب را کنترل می‌کند.</strong> تمدیدها همیشه از طریق metakey مسیریابی می‌شوند، بنابراین اشتراک‌های ایجاد شده در هر دو حالت با تغییر این تنظیم همچنان کار می‌کنند.<br><br><strong>REST مدرن</strong> (پیش‌فرض): مشتری از پنجره بازشوی دکمه‌های هوشمند استفاده می‌کند → برنامه‌ریزی عودت در سمت PayPal → cron برنامه از طریق /v1/billing/subscriptions/{id}/capture شارژ اجباری انجام می‌دهد. به عنوان paypal_subscription_id در metakey ذخیره می‌شود.<br><br><strong>NVP قدیمی</strong> (سازگار با J2Store): مشتری به PayPal Express Checkout کلاسیک هدایت می‌شود → BAID بازگردانده می‌شود → cron برنامه از طریق DoReferenceTransaction شارژ می‌کند. به عنوان billing_agreement_id در metakey ذخیره می‌شود. زمانی که از J2Store مهاجرت می‌کنید و قصد دارید بعداً یک ابزار مهاجرت BAIDهای قدیمی را به مقادیر paypal_subscription_id مدرن تبدیل کند، از این گزینه استفاده کنید."
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_REST="REST مدرن (دکمه‌های هوشمند)"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_NVP="NVP قدیمی / Express Checkout (سازگار با J2Store)"

; Configuration - NVP credentials (legacy J2Store BAID renewals — Path C hybrid)
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_SECTION_LABEL="مدارک NVP API (فقط برای تمدیدهای قدیمی)"
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_SECTION_DESC="<strong>فقط در صورتی که اشتراک‌های مهاجرت‌شده J2Store وجود داشته باشند (ردیف‌هایی در #__j2commerce_metafields با metakey=billing_agreement_id) مورد نیاز است.</strong> PayPal در سال ۲۰۲۳ صدور مدارک NVP را برای فروشندگان جدید متوقف کرد — اگر فروشنده جدیدی هستید، این فیلدها را خالی بگذارید؛ اشتراک‌ها از این نقطه به بعد از جریان REST مدرن استفاده می‌کنند. فروشندگان موجود J2Store: api_username، api_password و api_signature را در PayPal → تنظیمات حساب → دسترسی حساب → API access → NVP/SOAP API integration → Manage API credentials پیدا کنید."
