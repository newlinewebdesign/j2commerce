; Sandbox subscription test harness (admin-only, sandbox-mode-only)
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_LABEL="ابزار آزمایش اشتراک محیط آزمایشی"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_DESC="<strong>1. تست مدارک</strong> — بررسی می‌کند که client_id + secret محیط آزمایشی یک توکن OAuth معتبر دریافت کنند.<br><strong>2. ایجاد اشتراک</strong> — یک محصول کاتالوگ واقعی، برنامه صورتحساب (۱.۰۰$ در روز × ۵ دوره) و اشتراک در محیط آزمایشی شما ایجاد می‌کند. یک نشانی تأیید باز می‌گرداند — روی آن کلیک کنید، با یک حساب PERSONAL محیط آزمایشی وارد شوید و تأیید کنید.<br><strong>3. بررسی وضعیت</strong> — شناسه اشتراک I-XXXX را وارد کنید و تأیید کنید که remote_status پس از تأیید به ACTIVE تغییر کرده است.<br><strong>4. لغو</strong> — اشتراک آزمایشی را پاک کنید تا به صورتحساب حساب محیط آزمایشی ادامه ندهد."
