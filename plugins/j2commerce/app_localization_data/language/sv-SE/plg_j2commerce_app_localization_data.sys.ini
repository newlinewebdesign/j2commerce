; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce-appen för lokaliseringsdata"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Återställ och installera om lokaliseringsdata (länder, zoner, längder, vikter) från standardfilerna i J2Commerce-installationen. Använd det här verktyget om dina lokaliseringsdata har skadats eller om du behöver återställa standardvärdena."