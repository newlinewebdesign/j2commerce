; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Varning: Detta verktyg kommer att RADERA den valda tabellen helt och hållet och återställa standarddata från J2Commerce-installationsfilerna. Alla anpassade poster eller ändringar som du har gjort kommer att gå förlorade för alltid. Använd verktyget med försiktighet och se till att du har en säkerhetskopia av databasen innan du fortsätter."

