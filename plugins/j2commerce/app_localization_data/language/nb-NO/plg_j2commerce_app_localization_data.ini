; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Lokaliseringsdata-app"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Tilbakestill og installer lokaliseringsdata på nytt (land, soner, lengder, vekter) fra standard J2Commerce-installasjonsfiler. Bruk dette verktøyet hvis lokaliseringsdataene dine har blitt ødelagt, eller hvis du trenger å gjenopprette standardverdier."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Lokaliseringsverktøy"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Verktøy for lokaliseringsdata"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Land"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Soner"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Metrikker (lengder og vekter)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Viktig merknad"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Installer på nytt"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Behandler..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Advarsel: Dette verktøyet vil TRUNKERE den valgte tabellen fullstendig og installere standarddataene fra J2Commerce-installasjonsfilene på nytt. Eventuelle egendefinerte oppføringer eller endringer du har gjort, vil gå tapt permanent. Vær forsiktig og sørg for at du har en sikkerhetskopi av databasen før du fortsetter."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Nåværende poster: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Lengder: %d / Vekter: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Er du sikker på at du vil tilbakestille tabellen '%s'? Alle eksisterende data vil bli slettet permanent og erstattet med standardverdier."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Tabelldata har blitt installert på nytt."

; Errors
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TASK="Ugyldig oppgave spesifisert."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Ugyldig tabellnavn spesifisert."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="Det oppsto en feil under innsetting av data i tabellen."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Forespørselen mislyktes. Vennligst prøv igjen."