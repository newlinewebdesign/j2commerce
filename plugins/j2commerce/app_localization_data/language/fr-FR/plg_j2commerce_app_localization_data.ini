PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Enregistrements actuels : %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Longueurs : %d / Poids : %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Êtes-vous sûr de vouloir réinitialiser la table « %s » ? Toutes les données existantes seront définitivement supprimées et remplacées par les valeurs par défaut."

