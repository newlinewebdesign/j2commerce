PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Pays"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zones"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Unités de mesure (longueurs et poids)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Remarque importante"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Réinstaller"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Traitement en cours..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Avertissement : cet outil va TRONQUER intégralement la table sélectionnée et réinstaller les données par défaut issues des fichiers d'installation de J2Commerce. Toutes les entrées personnalisées ou modifications que vous avez apportées seront définitivement perdues. Veuillez l'utiliser avec prudence et vous assurer d'avoir une sauvegarde de la base de données avant de continuer."

