; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Application de données de localisation J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Réinitialisez et réinstallez les données de localisation (pays, zones, longueurs, poids) à partir des fichiers d'installation par défaut de J2Commerce. Utilisez cet outil si vos données de localisation ont été endommagées ou si vous devez rétablir les valeurs par défaut."