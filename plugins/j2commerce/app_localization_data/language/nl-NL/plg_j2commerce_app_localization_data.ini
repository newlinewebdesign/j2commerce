PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Er is een ongeldige tabelnaam opgegeven."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="Er is een fout opgetreden bij het invoeren van gegevens in de tabel."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Het verzoek is mislukt. Probeer het nog eens."