; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce-app voor lokalisatiegegevens"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Reset en installeer de lokalisatiegegevens (landen, zones, lengtematen, gewichten) opnieuw vanuit de standaardinstallatiebestanden van J2Commerce. Gebruik deze tool als uw lokalisatiegegevens beschadigd zijn geraakt of als u de standaardwaarden wilt herstellen."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Lokalisatietools"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Hulpmiddelen voor lokalisatiegegevens"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Landen"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Gebieden"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Maten (lengtes en gewichten)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Belangrijke opmerking"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Opnieuw installeren"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Bezig met verwerken..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Waarschuwing: Deze tool zal de geselecteerde tabel volledig WISSEN en de standaardgegevens uit de installatiebestanden van J2Commerce opnieuw installeren. Alle aangepaste gegevens of wijzigingen die u hebt aangebracht, gaan definitief verloren. Wees voorzichtig en zorg ervoor dat u een back-up van de database hebt voordat u doorgaat."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Huidige records: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Aantal: %d / Gewicht: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Weet u zeker dat u de tabel '%s' wilt resetten? Alle bestaande gegevens worden definitief verwijderd en vervangen door standaardwaarden."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="De tabelgegevens zijn succesvol opnieuw geïnstalleerd."

