; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Aplicación de datos de localización de J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Restablece y reinstala los datos de localización (Países, Zonas, Longitudes, Pesos) desde los archivos de instalación por defecto de J2Commerce. Utilice esta herramienta si sus datos de localización se han corrompido o si necesita restaurar los valores por defecto."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Herramientas de localización"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Herramientas de datos de localización"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Países"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zonas"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Métricas (longitudes y pesos)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Nota importante"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Vuelva a instalar"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Procesando..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Advertencia: Esta herramienta TRUNCARÁ completamente la tabla seleccionada y reinstalará los datos por defecto de los archivos de instalación de J2Commerce. Cualquier entrada personalizada o modificación que haya realizado se perderá permanentemente. Utilícela con precaución y asegúrese de tener una copia de seguridad de la base de datos antes de proceder."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Registros actuales: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Longitudes: %d / Pesos: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="¿Está seguro de que desea restablecer la tabla '%s'? Todos los datos existentes se borrarán permanentemente y se sustituirán por los valores predeterminados."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Los datos de la tabla se han reinstalado correctamente."

; Errors
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TASK="Tarea no válida especificada."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Se ha especificado un nombre de tabla no válido."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="Se ha producido un error al insertar datos en la tabla."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Solicitud fallida. Por favor, inténtelo de nuevo."
