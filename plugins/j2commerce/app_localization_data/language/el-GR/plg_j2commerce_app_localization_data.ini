; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Εφαρμογή δεδομένων τοπικής προσαρμογής J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Επαναφέρετε και επανεγκαταστήστε τα δεδομένα τοπικής προσαρμογής (Χώρες, Ζώνες, Μήκη, Βάρη) από τα αρχεία της προεπιλεγμένης εγκατάστασης του J2Commerce. Χρησιμοποιήστε αυτό το εργαλείο εάν τα δεδομένα τοπικής προσαρμογής σας έχουν καταστραφεί ή εάν πρέπει να επαναφέρετε τις προεπιλεγμένες τιμές."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Εργαλεία τοπικής προσαρμογής"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Εργαλεία δεδομένων τοπικής προσαρμογής"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Χώρες"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Περιοχές"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Μονάδες μέτρησης (μήκη και βάρη)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Σημαντική σημείωση"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Επανεγκατάσταση"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Επεξεργασία..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Προειδοποίηση: Αυτό το εργαλείο θα διαγράψει εντελώς τον επιλεγμένο πίνακα και θα επανεγκαταστήσει τα προεπιλεγμένα δεδομένα από τα αρχεία εγκατάστασης του J2Commerce. Οποιεσδήποτε προσαρμοσμένες καταχωρήσεις ή τροποποιήσεις έχετε πραγματοποιήσει θα χαθούν οριστικά. Χρησιμοποιήστε το με προσοχή και βεβαιωθείτε ότι έχετε δημιουργήσει αντίγραφο ασφαλείας της βάσης δεδομένων πριν προχωρήσετε."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Τρέχοντα αρχεία: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Μήκη: %d / Βάρη: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Είστε σίγουροι ότι θέλετε να επαναφέρετε τον πίνακα «%s»; Όλα τα υπάρχοντα δεδομένα θα διαγραφούν οριστικά και θα αντικατασταθούν με τις προεπιλεγμένες τιμές."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Τα δεδομένα του πίνακα έχουν επανεγκατασταθεί με επιτυχία."

