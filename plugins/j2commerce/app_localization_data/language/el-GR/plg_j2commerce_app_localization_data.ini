PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Δεν έχει καθοριστεί έγκυρο όνομα πίνακα."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="Παρουσιάστηκε σφάλμα κατά την εισαγωγή δεδομένων στον πίνακα."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Η αίτηση απέτυχε. Παρακαλώ δοκιμάστε ξανά."