PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TASK="指定されたタスクが無効です。"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="指定されたテーブル名が不正です。"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="テーブルへのデータ挿入中にエラーが発生しました。"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="リクエストに失敗しました。もう一度お試しください。"