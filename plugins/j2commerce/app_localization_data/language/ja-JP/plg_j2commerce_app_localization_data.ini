; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce ローカライズデータアプリ"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="J2Commerceのデフォルトのインストールファイルから、ローカライズデータ（国、地域、長さ、重量）をリセットして再インストールします。ローカライズデータが破損している場合や、デフォルト値に戻す必要がある場合に、このツールをご利用ください。"

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="ローカライズツール"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="ローカライズ用データツール"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="国"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="エリア"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="計量（長さ・重量）"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="重要なお知らせ"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="再インストール"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="処理中..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="警告：このツールを実行すると、選択したテーブルのデータが完全に削除され、J2Commerceのインストールファイルからデフォルトのデータが再インストールされます。これまでに追加したカスタムデータや変更内容はすべて永久に失われます。慎重にご利用いただき、作業を進める前に必ずデータベースのバックアップを作成してください。"

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="現在の記録：%d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="長さ：%d / 重さ：%d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="「%s」テーブルをリセットしてもよろしいですか？既存のデータはすべて完全に削除され、デフォルト値に置き換えられます。"

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="テーブルのデータが正常に再インストールされました。"

