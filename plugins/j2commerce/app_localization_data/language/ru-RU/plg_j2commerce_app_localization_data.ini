PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Важное примечание"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Переустановить"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Обрабатывается..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Предупреждение: данный инструмент полностью УДАЛИТ выбранную таблицу и восстановит исходные данные из установочных файлов J2Commerce. Все внесенные вами изменения и пользовательские записи будут безвозвратно утеряны. Используйте инструмент с осторожностью и убедитесь, что у вас имеется резервная копия базы данных, прежде чем продолжить."

