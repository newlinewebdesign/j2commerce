; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Приложение J2Commerce для локализационных данных"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Сбросьте и переустановите данные локализации (страны, зоны, размеры, вес) из файлов установки J2Commerce по умолчанию. Воспользуйтесь этим инструментом, если ваши данные локализации повреждены или вам необходимо восстановить значения по умолчанию."