PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="ملاحظة مهمة"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="إعادة التثبيت"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="جاري المعالجة..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="تحذير: ستقوم هذه الأداة بـ"اقتطاع" الجدول المحدد بالكامل وإعادة تثبيت البيانات الافتراضية من ملفات تثبيت J2Commerce. وستفقد بشكل نهائي أي إدخالات مخصصة أو تعديلات قمت بها. استخدم هذه الأداة بحذر وتأكد من وجود نسخة احتياطية لقاعدة البيانات قبل المتابعة."

