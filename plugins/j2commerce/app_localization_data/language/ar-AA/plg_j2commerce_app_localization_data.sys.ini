; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="تطبيق بيانات الترجمة من J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="إعادة تعيين بيانات الترجمة (البلدان، المناطق، المقاييس، الأوزان) وإعادة تثبيتها من ملفات التثبيت الافتراضية لـ J2Commerce. استخدم هذه الأداة إذا تعرضت بيانات الترجمة للتلف أو إذا كنت بحاجة إلى استعادة القيم الافتراضية."