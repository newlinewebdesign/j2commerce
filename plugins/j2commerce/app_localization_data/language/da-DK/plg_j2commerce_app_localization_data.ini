PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TASK="Ugyldig opgave angivet."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Ugyldigt tabelnavn angivet."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="Der opstod en fejl under indsættelse af data i tabellen."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Anmodning mislykkedes. Prøv venligst igen."