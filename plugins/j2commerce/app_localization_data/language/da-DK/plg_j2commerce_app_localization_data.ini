; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Lokaliseringsdata-app"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Nulstil og geninstaller lokaliseringsdata (lande, zoner, længder, vægte) fra standard J2Commerce-installationsfilerne. Brug dette værktøj, hvis dine lokaliseringsdata er blevet beskadiget, eller hvis du har brug for at gendanne standardværdier."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Lokaliseringsværktøjer"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Værktøjer til lokaliseringsdata"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Lande"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zoner"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Metrikker (længder og vægte)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Vigtig bemærkning"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Geninstaller"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Behandler..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Advarsel: Dette værktøj vil fuldstændig TRUNKERE den valgte tabel og geninstallere standarddataene fra J2Commerce-installationsfilerne. Eventuelle brugerdefinerede poster eller ændringer, du har foretaget, vil gå permanent tabt. Brug værktøjet med forsigtighed, og sørg for at have en sikkerhedskopi af databasen, før du fortsætter."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Nuværende poster: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Længder: %d / Vægte: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Er du sikker på, at du vil nulstille tabellen '%s'? Alle eksisterende data vil blive slettet permanent og erstattet med standardværdier."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Tabeldata er blevet geninstalleret."

