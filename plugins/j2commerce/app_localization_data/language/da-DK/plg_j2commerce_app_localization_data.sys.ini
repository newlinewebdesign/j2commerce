PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Lokaliseringsdata-app"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Nulstil og geninstaller lokaliseringsdata (lande, zoner, længder, vægte) fra standard J2Commerce-installationsfilerne. Brug dette værktøj, hvis dine lokaliseringsdata er blevet beskadiget, eller hvis du har brug for at gendanne standardværdier."