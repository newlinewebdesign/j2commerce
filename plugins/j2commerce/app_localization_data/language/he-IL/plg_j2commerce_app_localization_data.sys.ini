PLG_J2COMMERCE_APP_LOCALIZATION_DATA="אפליקציית נתוני לוקליזציה של J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="אפס והתקן מחדש את נתוני הלוקליזציה (מדינות, אזורים, מידות, משקלים) מקבצי ההתקנה המוגדרים כברירת מחדל של J2Commerce. השתמש בכלי זה אם נתוני הלוקליזציה שלך נפגעו או אם אתה צריך לשחזר את ערכי ברירת המחדל."