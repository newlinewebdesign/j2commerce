; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="האם אתה בטוח שברצונך לאפס את הטבלה '%s'? כל הנתונים הקיימים יימחקו לצמיתות ויוחלפו בערכי ברירת מחדל."

