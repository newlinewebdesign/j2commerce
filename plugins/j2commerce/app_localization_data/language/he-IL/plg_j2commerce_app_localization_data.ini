; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="אפליקציית נתוני לוקליזציה של J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="אפס והתקן מחדש את נתוני הלוקליזציה (מדינות, אזורים, מידות, משקלים) מקבצי ההתקנה המוגדרים כברירת מחדל של J2Commerce. השתמש בכלי זה אם נתוני הלוקליזציה שלך נפגעו או אם אתה צריך לשחזר את ערכי ברירת המחדל."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="כלי לוקליזציה"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="כלי נתוני לוקליזציה"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="מדינות"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="אזורים"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="מידות (אורך ומשקל)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="הערה חשובה"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="התקן מחדש"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="מעבד..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="אזהרה: כלי זה ימחק לחלוטין את הטבלה שנבחרה ויטען מחדש את הנתונים המוגדרים כברירת מחדל מקבצי ההתקנה של J2Commerce. כל הערכים המותאמים אישית או השינויים שביצעת יאבדו לצמיתות. יש להשתמש בכלי בזהירות ולוודא שיש ברשותך גיבוי של מסד הנתונים לפני שתמשיך."

