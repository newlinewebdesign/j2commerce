; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Localization Data App"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Reset and reinstall localization data (Countries, Zones, Lengths, Weights) from the default J2Commerce installation files. Use this tool if your localization data has been corrupted or if you need to restore default values."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Localization Tools"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Localization Data Tools"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Countries"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zones"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Metrics (Lengths & Weights)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Important Note"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Reinstall"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Processing..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Warning: This tool will completely TRUNCATE the selected table and reinstall the default data from the J2Commerce installation files. Any custom entries or modifications you have made will be permanently lost. Use with caution and ensure you have a database backup before proceeding."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Current records: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Lengths: %d / Weights: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Are you sure you want to reset the '%s' table? All existing data will be permanently deleted and replaced with default values."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Table data has been reinstalled."

; Errors
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TASK="Invalid task specified."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INVALID_TABLE="Invalid table name specified."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_INSERTION_ERROR="An error occurred while inserting data into the table."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ERR_REQUEST_FAILED="Request failed. Please try again."
