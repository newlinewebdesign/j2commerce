PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Localisation Data App"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Reset and reinstall localisation data (Countries, Zones, Lengths, Weights) from the default J2Commerce installation files. Use this tool if your localisation data has been corrupted or if you need to restore default values."