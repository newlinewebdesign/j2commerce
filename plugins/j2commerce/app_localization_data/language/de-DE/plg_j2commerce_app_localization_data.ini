; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Lokalisierungsdaten-App"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Zurücksetzen und Neuinstallieren von Lokalisierungsdaten (Länder, Zonen, Längen, Gewichte) aus den Standardinstallationsdateien von J2Commerce. Verwenden Sie dieses Tool, wenn Ihre Lokalisierungsdaten beschädigt wurden oder wenn Sie die Standardwerte wiederherstellen müssen."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Lokalisierungs-Tools"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Tools für Lokalisierungsdaten"

