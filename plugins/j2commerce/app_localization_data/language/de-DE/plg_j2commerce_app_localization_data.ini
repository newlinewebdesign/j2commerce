PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Länder"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zonen"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Metriken (Längen & Gewichte)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Wichtiger Hinweis"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Installieren Sie  neu."
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Verarbeitung..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Warnung: Dieses Tool wird die ausgewählte Tabelle vollständig TRUNKIEREN und die Standarddaten aus den J2Commerce-Installationsdateien neu installieren. Alle benutzerdefinierten Einträge oder Änderungen, die Sie vorgenommen haben, gehen dauerhaft verloren. Seien Sie vorsichtig und stellen Sie sicher, dass Sie eine Sicherungskopie Ihrer Datenbank haben, bevor Sie fortfahren."

