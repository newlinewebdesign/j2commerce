; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="App per i dati di localizzazione J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Ripristini e reinstalli i dati di localizzazione (Paesi, Zone, Misure di lunghezza, Pesi) dai file di installazione predefiniti di J2Commerce. Utilizzi questo strumento se i suoi dati di localizzazione sono stati danneggiati o se ha bisogno di ripristinare i valori predefiniti."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Strumenti di localizzazione"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Strumenti per i dati di localizzazione"

