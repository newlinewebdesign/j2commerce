PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Aree"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Unità di misura (lunghezze e pesi)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Nota importante"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Reinstallare"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="Elaborazione in corso..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Avviso: questo strumento TRONCHERÀ completamente la tabella selezionata e reinstallerà i dati predefiniti dai file di installazione di J2Commerce. Qualsiasi voce personalizzata o modifica apportata andrà persa definitivamente. Si raccomanda di procedere con cautela e di assicurarsi di disporre di un backup del database prima di continuare."

