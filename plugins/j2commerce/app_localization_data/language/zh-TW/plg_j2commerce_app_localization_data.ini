; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce 本地化資料應用程式"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="從預設的 J2Commerce 安裝檔案重設和重新安裝本地化資料（國家、區域、長度、重量）。如果您的本地化資料已損毀或需要還原預設值，請使用此工具。"

