; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="警告：此工具將完全截斷（TRUNCATE）所選的資料表，並重新安裝 J2Commerce 安裝檔案中的預設資料。您所做的任何自訂項目或修改將永久遺失。請謹慎使用，並確保在繼續操作前已備份資料庫。"

