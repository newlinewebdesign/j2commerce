; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Yerelleştirme Veri Uygulaması"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Yerelleştirme verilerini (Ülkeler, Bölgeler, Uzunluklar, Ağırlıklar) varsayılan J2Commerce kurulum dosyalarından sıfırlayın ve yeniden yükleyin. Yerelleştirme verileriniz bozulmuşsa veya varsayılan değerleri geri yüklemeniz gerekiyorsa bu aracı kullanın."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Yerelleştirme Araçları"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Yerelleştirme Veri Araçları"

