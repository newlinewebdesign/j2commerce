; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Uyarı: Bu araç, seçilen tabloyu tamamen TRUNCATE edecek ve J2Commerce kurulum dosyalarından varsayılan verileri yeniden yükleyecektir. Yaptığınız tüm özel girişler veya değişiklikler kalıcı olarak kaybolacaktır. Dikkatli kullanın ve devam etmeden önce bir veritabanı yedeğiniz olduğundan emin olun."

