; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Aplicação de dados de localização da J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Redefina e reinstale os dados de localização (países, zonas, comprimentos, pesos) a partir dos ficheiros de instalação predefinidos do J2Commerce. Utilize esta ferramenta se os seus dados de localização estiverem corrompidos ou se precisar de restaurar os valores predefinidos."

; Basic Settings
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_BASIC="Ferramentas de localização"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TOOLS="Ferramentas de dados de localização"

; UI Labels
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_COUNTRIES="Países"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_ZONES="Zonas"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_METRICS="Unidades de medida (comprimentos e pesos)"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_NOTE="Nota importante"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_INSTALL="Reinstalar"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_PROCESSING="A processar..."

; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Aviso: Esta ferramenta irá TRUNCAR completamente a tabela selecionada e reinstalar os dados predefinidos a partir dos ficheiros de instalação do J2Commerce. Quaisquer entradas personalizadas ou alterações que tenha efetuado serão perdidas de forma definitiva. Utilize com precaução e certifique-se de que dispõe de uma cópia de segurança da base de dados antes de prosseguir."

; Table Info
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO="Registos atuais: %d"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_TABLE_INFO_METRICS="Comprimentos: %d / Pesos: %d"

; Confirmation
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_CONFIRM_RESET="Tem a certeza de que deseja reiniciar a tabela «%s»? Todos os dados existentes serão eliminados definitivamente e substituídos por valores predefinidos."

; Messages
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_MSG_SUCCESS="Os dados da tabela foram reinstalados com sucesso."

