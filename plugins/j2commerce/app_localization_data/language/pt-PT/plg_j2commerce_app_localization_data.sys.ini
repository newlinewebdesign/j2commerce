; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Aplicação de dados de localização da J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Redefina e reinstale os dados de localização (países, zonas, comprimentos, pesos) a partir dos ficheiros de instalação predefinidos do J2Commerce. Utilize esta ferramenta se os seus dados de localização estiverem corrompidos ou se precisar de restaurar os valores predefinidos."