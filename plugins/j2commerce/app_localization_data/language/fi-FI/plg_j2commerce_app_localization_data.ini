; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Varoitus: Tämä työkalu katkaisee (TRUNCATE) valitun taulukon kokonaan ja asentaa uudelleen oletustiedot J2Commercen asennustiedostoista. Kaikki tekemäsi mukautetut merkinnät tai muutokset menetetään pysyvästi. Käytä varoen ja varmista, että sinulla on tietokannan varmuuskopio ennen jatkamista."

