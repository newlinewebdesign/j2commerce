; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="J2Commerce Lokalisointitietojen sovellus"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Nollaa ja asenna uudelleen lokalisointitiedot (maat, vyöhykkeet, pituudet, painot) J2Commercen oletusasennustiedostoista. Käytä tätä työkalua, jos lokalisointitiedot ovat vioittuneet tai jos haluat palauttaa oletusarvot."

