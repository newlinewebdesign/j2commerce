; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="Ostrzeżenie: To narzędzie całkowicie SKRÓCI wybraną tabelę i przywróci domyślne dane z plików instalacyjnych J2Commerce. Wszelkie wprowadzone przez Państwa niestandardowe wpisy lub modyfikacje zostaną trwale utracone. Prosimy o zachowanie ostrożności i upewnienie się, że posiadają Państwo kopię zapasową bazy danych, zanim przystąpią Państwo do działania."

