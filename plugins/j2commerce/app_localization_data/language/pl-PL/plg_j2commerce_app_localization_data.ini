; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="Aplikacja J2Commerce do obsługi danych lokalizacyjnych"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="Zresetuj i ponownie zainstaluj dane lokalizacyjne (kraje, strefy, długości, wagi) z domyślnych plików instalacyjnych J2Commerce. Proszę skorzystać z tego narzędzia, jeśli dane lokalizacyjne uległy uszkodzeniu lub jeśli konieczne jest przywrócenie wartości domyślnych."

